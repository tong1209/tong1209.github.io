<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>基本信息录入</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .required::before { content: '*'; color: red; margin-right: 2px; }
    
    /* 自定义绿色 */
    .text-custom-green {
      color: #00A758;
    }
    
    .bg-custom-green {
      background-color: #00A758;
    }
    
    /* 全局字体 */
    body {
      font-family: 'NotoSansCJKsc-Medium', sans-serif;
    }
  </style>
  <script>
    // 自定义确认弹窗函数
    function showConfirmModal(title, message, onConfirm) {
      const appContainer = document.querySelector('.w-\[375px\]');
      const overlay = document.createElement('div');
      overlay.className = 'confirm-overlay';
      overlay.style.cssText = 'position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;';
      overlay.innerHTML = `
        <div class="confirm-dialog" style="background:white;border-radius:12px;width:280px;padding:20px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.15);">
          <div style="font-size:16px;font-weight:bold;color:#333;margin-bottom:12px;">${title}</div>
          <div style="font-size:14px;color:#666;margin-bottom:20px;line-height:1.5;">${message}</div>
          <div style="display:flex;gap:12px;justify-content:center;">
            <button class="btn-cancel" style="flex:1;padding:10px 0;border-radius:6px;border:1px solid #ddd;background:#fff;color:#666;font-size:14px;cursor:pointer;">取消</button>
            <button class="btn-confirm" style="flex:1;padding:10px 0;border-radius:6px;border:none;background:#00A758;color:#fff;font-size:14px;cursor:pointer;">确定</button>
          </div>
        </div>
      `;
      appContainer.appendChild(overlay);
      overlay.querySelector('.btn-cancel').onclick = () => overlay.remove();
      overlay.querySelector('.btn-confirm').onclick = () => {
        overlay.remove();
        onConfirm();
      };
    }
    
    // 处理证件类型变化
    function handleIdTypeChange() {
      const idType = document.getElementById('idType').value;
      const birthDateContainer = document.getElementById('birthDateContainer');
      const genderContainer = document.getElementById('genderContainer');
      const birthDate = document.getElementById('birthDate');
      const gender = document.getElementById('gender');
      
      if (idType === '001') { // 身份证
        // 出生日期和性别设为只读，从证件号获取
        birthDate.readOnly = true;
        birthDate.placeholder = '根据证件号自动获取';
        gender.disabled = true;
        gender.querySelector('option[value=""]').textContent = '根据证件号自动获取';
      } else { // 外国人永久身份居留证、港澳居民来往内地通行证
        // 出生日期和性别设为必填可编辑
        birthDate.readOnly = false;
        birthDate.placeholder = '请选择出生日期';
        gender.disabled = false;
        gender.querySelector('option[value=""]').textContent = '请选择性别';
      }
    }
    
    // 页面加载时初始化
    window.onload = function() {
      handleIdTypeChange();
    };
  </script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
<!-- APP Container -->
<div class="w-[375px] h-[770px] bg-white border border-gray-200 rounded-[40px] shadow-2xl relative overflow-hidden flex flex-col">
<!-- Title Bar -->
<div class="h-[56px] flex items-center justify-between px-4 pt-4 bg-white border-b border-gray-50">
<span class="iconify w-6 h-6 text-gray-700 z-10" data-icon="material-symbols:arrow-back-ios-new-rounded" onclick="window.history.back();"></span>
<h1 class="text-lg font-bold text-gray-900 flex-1 text-center">基本信息录入</h1>
<div class="w-6"></div>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto hide-scrollbar bg-gray-50 px-4 py-4 space-y-4">
<!-- Form Container -->
<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 space-y-4">
<!-- 姓名 -->
<div class="flex items-center space-x-2">
<label class="text-xs font-medium text-gray-700 required w-24">姓名</label>
<input type="text" class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-xs" placeholder="请输入姓名"/>
</div>

<!-- 证件类型 -->
<div class="flex items-center space-x-2">
<label class="text-xs font-medium text-gray-700 required w-24">证件类型</label>
<div class="flex-1 relative">
<select class="w-full px-3 py-2 border border-gray-200 rounded-lg text-xs" id="idType" onchange="handleIdTypeChange()">
<option value="">请选择证件类型</option>
<option value="001">身份证</option>
<option value="002">外国人永久身份居留证</option>
<option value="003">港澳居民来往内地通行证</option>
</select>
<span class="absolute right-6 top-2.5 text-gray-400">
<span class="iconify w-4 h-4" data-icon="ic:baseline-camera"></span>
</span>
</div>
</div>



<!-- 证件号 -->
<div class="flex items-center space-x-2">
<label class="text-xs font-medium text-gray-700 required w-24">证件号</label>
<input type="text" class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-xs" placeholder="请输入证件号"/>
</div>

<!-- 出生日期 -->
<div class="flex items-center space-x-2" id="birthDateContainer">
<label class="text-xs font-medium text-gray-700 required w-24">出生日期</label>
<input type="date" id="birthDate" class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-xs"/>
</div>

<!-- 性别 -->
<div class="flex items-center space-x-2" id="genderContainer">
<label class="text-xs font-medium text-gray-700 required w-24">性别</label>
<select id="gender" class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-xs">
<option value="">请选择性别</option>
<option value="M">男</option>
<option value="F">女</option>
</select>
</div>

<option value="">请选择现居住地</option>

<!-- 详细地址 
<div class="flex items-center space-x-2">
<label class="text-xs font-medium text-gray-700 required w-24">详细地址</label>
<input type="text" class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-xs" placeholder="请输入详细地址"/>
</div>-->

<!-- 学历 -->
<div class="flex items-center space-x-2">
<label class="text-xs font-medium text-gray-700 required w-24">学历</label>
<select class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-xs">
<option value="">请选择学历</option>
<option value="004">大专</option>
<option value="005">本科</option>
<option value="006">硕士</option>
<option value="007">博士</option>
</select>
</div>

<!-- 简历 -->
<div class="flex items-center space-x-2">
<label class="text-xs font-medium text-gray-700 required w-24">简历</label>
<input type="file" class="w-48 px-3 py-2 border border-gray-200 rounded-lg text-xs" accept=".pdf" placeholder="请上传简历"/>
</div>

<!-- 手机号码 -->
<div class="flex items-center space-x-2">
<label class="text-xs font-medium text-gray-700 required w-24">手机号码</label>
<input type="tel" class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-xs" placeholder="请输入手机号码"/>
</div>

<!-- 手机验证码 -->
<div class="flex items-center space-x-2">
<label class="text-xs font-medium text-gray-700 required w-24">手机验证码</label>
<div class="flex-1 flex space-x-2">
<input type="text" class="w-2/3 px-3 py-2 border border-gray-200 rounded-lg text-xs" placeholder="请输入验证码"/>
<button class="bg-white border border-gray-200 text-xs text-gray-700 py-2 px-3 rounded-lg whitespace-nowrap">获取验证码</button>
</div>
</div>


</div>

<!-- 功能按钮 -->
<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mt-4">
<div class="flex items-start space-x-2 mb-4">
<input type="checkbox" id="agreementCheckbox" class="mt-0.5 h-4 w-4 rounded border-gray-300 text-[#00A758] focus:ring-[#00A758]" required>
<label for="agreementCheckbox" class="text-xs text-gray-600 flex-1">
本人授权中宏保险收集上述所列之本人个人信息，并将上述信息用于代理制银保专管员招募、招募数据分析、监管审查及通过指定的第三方渠道核查本人的信用、违法失信等信息。本人知悉并确认：中宏保险在获取上述本人个人信息后，将按照双方约定进行个人信息处理，包括存储、保存、使用、共享。
</label>
</div>
<div class="flex">
<button class="flex-1 bg-[#00A758] text-white text-xs font-medium py-2 px-4 rounded-lg shadow-md" onclick="if(document.getElementById('agreementCheckbox').checked && confirm('请确认填写的基本信息准确无误，提交后将进入初面安排流程。')) window.location.href='BSM入司主界面.html'; else if(!document.getElementById('agreementCheckbox').checked) alert('请先勾选确认协议');">提交</button>
</div>
</div>
</div>
</div>
