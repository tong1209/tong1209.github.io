<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>入司成功</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* 自定义绿色 */
        .text-custom-green {
            color: #00A758;
        }
        
        .bg-custom-green {
            background-color: #00A758;
        }
        
        /* 全局字体 */
        body {
            font-family: 'NotoSansCJKsc-Medium', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 flex justify-center items-start min-h-screen p-4">
    <!-- APP容器 (375x812) -->
    <div class="w-[375px] h-[812px] bg-white border border-gray-200 rounded-[40px] shadow-2xl relative overflow-hidden flex flex-col">
        <!-- 顶部状态栏 (44px) -->
        <div class="h-[44px] bg-white flex justify-between items-center px-6 shrink-0">
            <span class="text-sm font-semibold">10:05</span>
            <div class="flex items-center space-x-1.5 opacity-70">
                <span class="iconify w-4 h-4" data-icon="material-symbols:signal-cellular-4-bar"></span>
                <span class="iconify w-4 h-4" data-icon="material-symbols:wifi"></span>
                <div class="flex items-center border border-black rounded-[2px] px-[1px] h-3 w-6">
                    <div class="bg-black h-full w-[32%]"></div>
                </div>
            </div>
        </div>
        
        <!-- 标题栏 (56px) -->
        <div class="h-[56px] bg-white flex items-center px-4 shrink-0 border-b border-gray-50">
            <span class="iconify w-6 h-6 text-gray-700 z-10" data-icon="material-symbols:arrow-back-ios-new-rounded" onclick="window.history.back();"></span>
            <h1 class="text-lg font-bold text-gray-900 flex-1 text-center">入司进度</h1>
            <div class="w-6"></div>
        </div>
        
        <!-- 主要内容区 -->
        <div class="flex-1 overflow-y-auto hide-scrollbar bg-gray-50 px-4 py-4 space-y-4">
            <!-- 成功标识 -->
            <div class="flex flex-col items-center justify-center py-10">
                <div class="w-20 h-20 rounded-full bg-green-100 flex items-center justify-center mb-6">
                    <span class="iconify w-12 h-12 text-green-500" data-icon="material-symbols:check-circle"></span>
                </div>
                <h2 class="text-2xl font-bold text-gray-900 mb-2">入司成功</h2>
                <p class="text-gray-500 text-center px-8">恭喜您已成为我们的新同事<br/>欢迎加入我们的团队</p>
            </div>
            
            <!-- 入司信息 -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
                <h3 class="text-base font-bold text-gray-900 mb-4">入司信息</h3>
                <div class="space-y-3">
                    <div class="flex justify-between">
                        <span class="text-gray-500">姓名</span>
                        <span class="text-gray-900 font-medium">张三</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-500">工号</span>
                        <span class="text-gray-900 font-medium">ZP20260001</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-500">入司日期</span>
                        <span class="text-gray-900 font-medium">2026-03-22</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-500">职位</span>
                        <span class="text-gray-900 font-medium">BSM客户经理</span>
                    </div>
                </div>
            </div>
            
            <!-- 下一步操作 -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
                <h3 class="text-base font-bold text-gray-900 mb-4">下一步操作</h3>
                <div class="space-y-3">
                    <div class="flex items-center">
                        <span class="iconify w-5 h-5 text-gray-500 mr-2" data-icon="material-symbols:circle"></span>
                        <span class="text-gray-700">参加新员工培训</span>
                    </div>
                    <div class="flex items-center">
                        <span class="iconify w-5 h-5 text-gray-500 mr-2" data-icon="material-symbols:circle"></span>
                        <span class="text-gray-700">熟悉工作平台</span>
                    </div>
                    <div class="flex items-center">
                        <span class="iconify w-5 h-5 text-gray-500 mr-2" data-icon="material-symbols:circle"></span>
                        <span class="text-gray-700">联系您的导师</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 底部按钮 -->
        <div class="bg-white p-4 border-t border-gray-200">
            <button class="w-full bg-custom-green text-white py-3 rounded-lg text-base font-medium shadow-md" onclick="window.location.href='我的.html'">
                查看个人主页
            </button>
        </div>
        
        <!-- 底部安全条 -->
        <div class="safe-area"></div>
    </div>
</body>
</html>
