<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>简历查看</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .required::before { content: '*'; color: red; margin-right: 2px; }
    
    /* 自定义绿色 */
    .text-custom-green {
      color: #00A758;
    }
    
    .bg-custom-green {
      background-color: #00A758;
    }
    
    /* 全局字体 */
    body {
      font-family: 'NotoSansCJKsc-Medium', sans-serif;
    }
    

  </style>
  <script>
    function goBack() {
      window.close();
    }
  </script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
<!-- APP容器 (375x812) -->
<div class="w-[375px] h-[812px] bg-white border border-gray-200 rounded-[40px] shadow-2xl relative overflow-hidden flex flex-col">
<!-- Title Bar -->
<div class="h-[56px] flex items-center justify-between px-4 pt-4 bg-white border-b border-gray-50">
<span class="iconify w-6 h-6 text-gray-700 z-10" data-icon="material-symbols:chevron-left" onclick="goBack();"></span>
<h1 class="text-lg font-bold text-gray-900 flex-1 text-center">简历查看</h1>
<span class="iconify w-6 h-6 text-gray-700 z-10" data-icon="material-symbols:chevron-right" onclick="goBack();"></span>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto hide-scrollbar bg-gray-50 px-4 py-4">
<!-- 简历预览 -->
<div class="resume-container bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
<div class="resume-content" style="transform: scale(1); transform-origin: top left;">
<!-- 这里使用PDF预览的占位符，实际项目中可以使用PDF.js或其他库实现 -->
<div class="w-full bg-white rounded-lg overflow-hidden">
<!-- 模拟PDF预览 -->
<div class="bg-white p-4 border border-gray-200 rounded-lg">
<div class="flex justify-between items-center mb-4">
<span class="text-sm font-medium">简历.pdf</span>
<span class="text-xs text-gray-500">1.2 MB</span>
</div>
<!-- PDF预览区域 -->
<div class="w-full bg-gray-50 border border-gray-200 rounded-lg p-8 flex flex-col items-center justify-center">
<div class="w-16 h-16 mb-4">
<span class="iconify w-16 h-16 text-gray-400" data-icon="file-icons:adobe-pdf"></span>
</div>
<p class="text-sm text-gray-500 text-center">PDF预览</p>
<p class="text-xs text-gray-400 text-center mt-2">点击查看完整内容</p>
</div>
</div>
</div>
</div>


</div>
</div>
</div>

<!-- Documentation Panel -->
<div class="w-[700px] h-[812px] bg-gray-100 border border-gray-200 rounded-[20px] shadow-xl p-6 overflow-y-auto">
<h1 class="text-2xl font-bold text-gray-900 mb-6">需求说明</h1>

<div class="mb-8">
<div class="pl-6 space-y-4 text-gray-700">
<p class="mb-2">1. 功能描述：点击"简历查看"按钮后，在新页面中展示上传的PDF或图片，支持放大缩小</p>
<p class="mb-2">2. 交互逻辑：</p>
<p class="mb-2">　　2.1. 双指张开➡图片放大，最大放大500%，继续操作无效果</p>
<p class="mb-2">　　2.2. 双指合拢➡图片缩小，最小缩小50%，继续操作无效果</p>
<p class="mb-2">　　2.3. 缩放实时跟随手势，与单指移动同时生效，可以边缩放边移动查看</p>
<p class="mb-2">4. 页面顶部有上一页、下一页按钮，点击后关闭当前页面</p>
<p class="mb-2">6. 页面顶部有返回按钮，点击后关闭当前页面</p>
</div>
</body>
</html>
