<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>选择一个聊天</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <style>
        /* 隐藏滚动条 */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* 搜索框样式 */
        .search-box {
            background-color: #f5f5f5;
        }
        
        /* 发送按钮绿色 */
        .send-btn {
            background-color: #07C160;
        }
        
        /* 底部面板阴影 */
        .bottom-panel {
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
    <!-- APP Container: 375x812 -->
    <div class="w-[375px] h-[770px] bg-white border border-gray-200 rounded-[40px] shadow-2xl relative overflow-hidden flex flex-col">
        
        <!-- 顶部导航栏 -->
        <div class="h-12 flex items-center justify-between px-4 bg-white border-b border-gray-100">
            <button class="text-gray-800 flex items-center">
                <span class="iconify w-5 h-5" data-icon="material-symbols:arrow-back-ios-new-rounded"></span>
            </button>
            <h1 class="text-base font-medium text-gray-800">选择一个聊天</h1>
            <button class="text-gray-800 text-sm">多选</button>
        </div>
        
        <!-- 搜索栏 -->
        <div class="px-4 py-3 bg-white">
            <div class="search-box rounded-lg flex items-center px-3 py-2">
                <span class="iconify w-4 h-4 text-gray-400 mr-2" data-icon="material-symbols:search"></span>
                <input type="text" placeholder="搜索" class="bg-transparent text-sm text-gray-700 outline-none flex-1">
            </div>
        </div>
        
        <!-- 内容区域 -->
        <div class="flex-1 overflow-y-auto hide-scrollbar">
            
            <!-- 最近转发 -->
            <div class="bg-white px-4 py-3">
                <h2 class="text-xs text-gray-500 mb-3">最近转发</h2>
                <div class="flex space-x-4 overflow-x-auto hide-scrollbar">
                    <!-- 联系人1 -->
                    <div class="flex flex-col items-center min-w-[56px]">
                        <div class="w-14 h-14 rounded-lg overflow-hidden mb-1">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=L.M.Dean" alt="L.M.Dean" class="w-full h-full object-cover">
                        </div>
                        <span class="text-xs text-gray-700 truncate w-full text-center">L.M.Dean</span>
                    </div>
                    <!-- 联系人2 -->
                    <div class="flex flex-col items-center min-w-[56px]">
                        <div class="w-14 h-14 rounded-lg overflow-hidden mb-1">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=zhangsan" alt="张三" class="w-full h-full object-cover">
                        </div>
                        <span class="text-xs text-gray-700 truncate w-full text-center">张三</span>
                    </div>
                    <!-- 群组1 -->
                    <div class="flex flex-col items-center min-w-[56px]">
                        <div class="w-14 h-14 rounded-lg overflow-hidden mb-1 bg-gray-200 flex items-center justify-center">
                            <div class="grid grid-cols-2 gap-0.5 p-1">
                                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=1" class="w-5 h-5 rounded">
                                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=2" class="w-5 h-5 rounded">
                                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=3" class="w-5 h-5 rounded">
                                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=4" class="w-5 h-5 rounded">
                            </div>
                        </div>
                        <span class="text-xs text-gray-700 truncate w-full text-center">吃饭小分队</span>
                    </div>
                    <!-- 联系人3 -->
                    <div class="flex flex-col items-center min-w-[56px]">
                        <div class="w-14 h-14 rounded-lg overflow-hidden mb-1">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=dj" alt="渠道不止DJ头" class="w-full h-full object-cover">
                        </div>
                        <span class="text-xs text-gray-700 truncate w-full text-center">渠道不止DJ头</span>
                    </div>
                    <!-- 文件传输助手 -->
                    <div class="flex flex-col items-center min-w-[56px]">
                        <div class="w-14 h-14 rounded-lg overflow-hidden mb-1 bg-[#07C160] flex items-center justify-center">
                            <span class="iconify w-8 h-8 text-white" data-icon="material-symbols:folder-open"></span>
                        </div>
                        <span class="text-xs text-gray-700 truncate w-full text-center">文件传输助手</span>
                    </div>
                </div>
            </div>
            
            <!-- 最近聊天 -->
            <div class="bg-white mt-2">
                <div class="px-4 py-3 flex items-center justify-between">
                    <h2 class="text-xs text-gray-500">最近聊天</h2>
                    <button class="text-xs text-gray-500 flex items-center">
                        <span class="iconify w-3 h-3 mr-1" data-icon="material-symbols:add"></span>
                        创建新的聊天
                    </button>
                </div>
                
                <!-- 聊天列表项 -->
                <div class="px-4 py-3 flex items-center border-t border-gray-50 active:bg-gray-50">
                    <div class="w-10 h-10 rounded bg-gray-200 flex items-center justify-center mr-3 overflow-hidden">
                        <div class="grid grid-cols-2 gap-0.5 p-0.5">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=a1" class="w-3.5 h-3.5 rounded">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=a2" class="w-3.5 h-3.5 rounded">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=a3" class="w-3.5 h-3.5 rounded">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=a4" class="w-3.5 h-3.5 rounded">
                        </div>
                    </div>
                    <span class="text-sm text-gray-800">吃饭小分队</span>
                </div>
            </div>
            
        </div>
        
        <!-- 底部发送面板 -->
        <div class="bottom-panel bg-white px-4 py-3">
            <!-- 发送给 -->
            <div class="text-xs text-gray-500 mb-2">发送给：</div>
            
            <!-- 选中的联系人 -->
            <div class="flex items-center mb-3">
                <div class="w-8 h-8 rounded overflow-hidden mr-2">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=L.M.Dean" alt="L.M.Dean" class="w-full h-full object-cover">
                </div>
                <span class="text-sm text-gray-800">L.M.Dean</span>
                <span class="iconify w-4 h-4 text-gray-400 ml-1" data-icon="material-symbols:chevron-right"></span>
            </div>
            
            <!-- 分享内容预览 -->
            <div class="bg-gray-50 rounded-lg p-3 mb-3 flex items-start">
                <div class="w-12 h-12 rounded bg-[#E6F7EE] flex items-center justify-center mr-3 flex-shrink-0">
                    <span class="iconify w-6 h-6 text-[#07C160]" data-icon="material-symbols:description"></span>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm text-gray-800 truncate">入司基本信息填写</p>
                    <p class="text-xs text-gray-400 mt-0.5">请填写入司基本信息</p>
                </div>
            </div>
            
            <!-- 留言输入框 -->
            <div class="flex items-center mb-3">
                <input type="text" placeholder="发消息..." class="flex-1 bg-gray-100 rounded-full px-4 py-2 text-sm text-gray-700 outline-none">
                <button class="ml-2 text-gray-400">
                    <span class="iconify w-6 h-6" data-icon="material-symbols:sentiment-satisfied-outline"></span>
                </button>
            </div>
            
            <!-- 取消和发送按钮 -->
            <div class="flex space-x-3">
                <button class="flex-1 bg-gray-100 text-gray-700 py-3 rounded-lg text-base font-medium" onclick="window.history.back();">取消</button>
                <button class="flex-1 send-btn text-white py-3 rounded-lg text-base font-medium" onclick="window.location.href='入司基本信息聊天页面.html';">发送</button>
            </div>
        </div>
        
    </div>
</body>
</html>
