<style>
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    /* 全局字体 */
    body {
      font-family: 'NotoSansCJKsc-Medium', sans-serif;
    }
    
    /* 自定义绿色 */
    .text-custom-green {
      color: #00A758;
    }
    
    .bg-custom-green {
      background-color: #00A758;
    }
    
    .border-custom-green {
      border-color: #00A758;
    }
    
    /* 珊瑚红 */
    .text-coral-red {
      color: #EC6453;
    }
    
    /* 环形进度条 */
    .ring-progress {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    
    /* 卡片悬停效果 */
    .customer-card {
      transition: all 0.3s ease;
    }
    
    .customer-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    
    /* 渐变背景 */
    .bg-gradient-green {
      background: linear-gradient(135deg, #00A758 0%, #008F4D 100%);
    }
    
    /* 卡片背景 */
    .card-bg {
      background: #ffffff;
    }
    
    /* 标签样式 */
    .customer-tag {
      transition: all 0.2s ease;
    }
    
    /* 面试官已分配标签 */
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 500;
    }
    
    .interviewer-assigned {
      background-color: #E0F2FE;
      color: #0284C7;
    }
    
    /* 搜索框样式 */
    .search-input {
      transition: all 0.3s ease;
    }
    
    .search-input:focus {
      box-shadow: 0 0 0 3px rgba(0, 167, 88, 0.1);
    }
    
    /* 动画效果 */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .fade-in-up {
      animation: fadeInUp 0.5s ease forwards;
    }
    
    /* 延迟动画 */
    .delay-100 {
      animation-delay: 0.1s;
    }
    
    .delay-200 {
      animation-delay: 0.2s;
    }
    
    .delay-300 {
      animation-delay: 0.3s;
    }
    
    /* 筛选弹窗样式 */
    .filter-modal {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 20;
      justify-content: center;
      align-items: center;
    }
    
    .filter-modal.active {
      display: flex;
    }
    
    .filter-modal-content {
      background: white;
      width: 90%;
      max-height: 70%;
      border-radius: 16px;
      padding: 16px;
      position: relative;
      overflow-y: auto;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      scrollbar-width: none; /* Firefox */
      -ms-overflow-style: none; /* IE and Edge */
    }

    .filter-modal-content::-webkit-scrollbar {
      display: none; /* Chrome, Safari and Opera */
    }
    
    /* 保存筛选弹窗样式 */
    .save-filter-modal {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 30;
      justify-content: center;
      align-items: center;
    }
    
    .save-filter-modal.active {
      display: flex;
    }
    
    .save-filter-modal-content {
      background: white;
      width: 80%;
      border-radius: 16px;
      padding: 20px;
      position: relative;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    
    .filter-group {
      margin-bottom: 8px;
    }
    
    .filter-group-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #374151;
    }
    
    .filter-option {
      display: inline-block;
      margin: 4px 4px 4px 0;
    }
    
    .filter-option button {
      padding: 4px 8px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      background: white;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .filter-option button:hover {
      border-color: #00A758;
      color: #00A758;
    }
    
    .filter-option button.active {
      background-color: #00A758 !important;
      color: white !important;
      border-color: #00A758 !important;
    }
    
    .custom-date-panel {
      margin-top: 8px;
      margin-bottom: 8px;
    }
  </style>
  <script>
    // 筛选弹框功能
    function toggleFilter() {
      const filterModal = document.getElementById('filterModal');
      filterModal.classList.toggle('active');
    }
    
    function resetFilters() {
      const selects = document.querySelectorAll('#filterModal select');
      selects.forEach(select => {
        select.value = '全部';
      });
      
      const buttons = document.querySelectorAll('#filterModal .filter-option button');
      buttons.forEach(button => {
        button.classList.remove('active');
        if (button.textContent === '全部') {
          button.classList.add('active');
        }
      });
    }
    
    function applyFilters() {
      toggleFilter();
    }
    
    function showSaveFilterModal() {
      const saveFilterModal = document.getElementById('saveFilterModal');
      saveFilterModal.classList.add('active');
    }
    
    function closeSaveFilterModal() {
      const saveFilterModal = document.getElementById('saveFilterModal');
      saveFilterModal.classList.remove('active');
    }
    
    function saveFilter() {
      // 保存筛选逻辑
      closeSaveFilterModal();
      toggleFilter();
    }
    
    document.addEventListener('DOMContentLoaded', function() {
      const filterModal = document.getElementById('filterModal');
      
      // 点击弹框外部关闭
      filterModal.addEventListener('click', function(e) {
        if (e.target === filterModal) {
          toggleFilter();
        }
      });
      
      // 为客户卡片添加动画
    const customerCards = document.querySelectorAll('.customer-card');
    customerCards.forEach((card, index) => {
      card.classList.add('fade-in-up', `delay-${index * 100}`);
    });
    
    // 为筛选选项添加点击事件，支持多选
    const filterButtons = document.querySelectorAll('#filterModal .filter-option button');
    filterButtons.forEach(button => {
      button.addEventListener('click', function() {
        // 支持多选的筛选类别
        const multiSelectGroups = ['保单状态', '客户类型', '尊享会员等级', '产品类别'];
        const parentGroup = this.closest('.space-y-2');
        const groupTitle = parentGroup.querySelector('label')?.textContent;
        
        if (multiSelectGroups.includes(groupTitle)) {
          // 多选逻辑
          if (this.textContent === '全部') {
            // 点击"全部"时，只选中"全部"
            const groupButtons = parentGroup.querySelectorAll('.filter-option button');
            groupButtons.forEach(btn => {
              btn.classList.remove('active');
            });
            this.classList.add('active');
          } else {
            // 点击其他选项时，切换选中状态
            this.classList.toggle('active');
            // 如果有其他选项被选中，移除"全部"的选中状态
            const groupButtons = parentGroup.querySelectorAll('.filter-option button');
            const allButton = Array.from(groupButtons).find(btn => btn.textContent === '全部');
            const hasActiveButtons = Array.from(groupButtons).some(btn => btn !== allButton && btn.classList.contains('active'));
            if (hasActiveButtons && allButton) {
              allButton.classList.remove('active');
            } else if (!hasActiveButtons && allButton) {
              // 如果没有其他选项被选中，选中"全部"
              allButton.classList.add('active');
            }
          }
        } else {
          // 保持原有单选逻辑
          const groupButtons = parentGroup.querySelectorAll('.filter-option button');
          groupButtons.forEach(btn => {
            btn.classList.remove('active');
          });
          this.classList.add('active');
        }
      });
    });
  });
  
  // 已移除面试官文字切换功能
</script>
