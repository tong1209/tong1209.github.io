<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#1E3A4C">
    <title>宏图</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 手机外框 */
        .phone-frame {
            width: 375px;
            height: 780px;
            background: #FFFFFF;
            border: 1px solid #e5e7eb;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            position: relative;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 主内容区域 */
        .main-content {
            padding: 0 0 20px 0;
            overflow-y: auto;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .main-content::-webkit-scrollbar {
            display: none;
        }
        
        .phone-frame {
            overflow-x: hidden;
            overflow-y: hidden;
        }
        
        /* 禁用文本选择 */
        * {
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* 允许输入框选择 */
        input, textarea {
            -webkit-user-select: auto;
            user-select: auto;
        }
        
        /* 状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: max(12px, env(safe-area-inset-top)) 24px 8px;
            color: white;
            font-size: 15px;
            font-weight: 600;
        }
        
        .status-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .signal-icon {
            display: flex;
            gap: 2px;
            align-items: flex-end;
        }
        
        .signal-bar {
            width: 3px;
            background: white;
            border-radius: 1px;
        }
        
        .battery-icon {
            width: 27px;
            height: 13px;
            border: 1.5px solid rgba(255,255,255,0.6);
            border-radius: 3px;
            position: relative;
            display: flex;
            align-items: center;
            padding: 2px;
        }
        
        .battery-icon::after {
            content: '';
            position: absolute;
            right: -3px;
            width: 2px;
            height: 6px;
            background: rgba(255,255,255,0.6);
            border-radius: 0 1px 1px 0;
        }
        
        .battery-level {
            width: 70%;
            height: 100%;
            background: #4ADE80;
            border-radius: 1px;
        }
        
        /* 天气小组件 */
        .weather-widget {
            margin: 8px 16px;
            background: rgba(60, 70, 80, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 16px 20px;
            color: white;
        }
        
        .weather-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .location {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 17px;
            font-weight: 600;
        }
        
        .weather-icon-main {
            text-align: right;
        }
        
        .weather-icon-main .iconify {
            font-size: 28px;
        }
        
        .weather-desc {
            font-size: 15px;
            margin-top: 4px;
        }
        
        .temperature-main {
            font-size: 64px;
            font-weight: 300;
            line-height: 1;
            margin-bottom: 8px;
        }
        
        .temp-range {
            display: flex;
            gap: 16px;
            font-size: 15px;
            margin-bottom: 16px;
        }
        
        .temp-range span {
            opacity: 0.7;
        }
        
        .temp-range strong {
            opacity: 1;
            font-weight: 500;
        }
        
        /* 小时预报 */
        .hourly-forecast {
            display: flex;
            justify-content: space-between;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .hour-item {
            text-align: center;
            flex: 1;
        }
        
        .hour-time {
            font-size: 13px;
            opacity: 0.8;
            margin-bottom: 8px;
        }
        
        .hour-icon {
            font-size: 22px;
            margin-bottom: 6px;
        }
        
        .hour-temp {
            font-size: 15px;
            font-weight: 500;
        }
        
        /* 天气标签 */
        .weather-label {
            text-align: center;
            color: rgba(255,255,255,0.9);
            font-size: 13px;
            margin: 8px 0 16px;
        }
        
        /* 应用网格 */
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px 12px;
            padding: 0 16px;
            margin-bottom: 24px;
        }
        
        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        
        .app-icon {
            width: 60px;
            height: 60px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            position: relative;
        }
        
        .app-icon img {
            width: 100%;
            height: 100%;
            border-radius: 14px;
            object-fit: cover;
        }
        
        .app-name {
            color: white;
            font-size: 11px;
            text-align: center;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }
        
        /* 电池小组件 */
        .battery-widget {
            grid-column: span 2;
            background: linear-gradient(135deg, #8B4A4A 0%, #A85D5D 100%);
            border-radius: 20px;
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .battery-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        
        .battery-ring {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #4ADE80;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .battery-ring::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: #4ADE80;
            transform: rotate(45deg);
        }
        
        .battery-icon-inner {
            color: white;
            font-size: 20px;
        }
        
        /* 宏图UAT图标 */
        .hongtu-icon {
            background: transparent;
            padding: 0;
            overflow: hidden;
        }
        
        .hongtu-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 14px;
        }
        
        /* 密码图标 */
        .password-icon {
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        
        .key-shape {
            width: 28px;
            height: 36px;
            position: relative;
        }
        
        /* 手记图标 */
        .notes-icon {
            background: linear-gradient(135deg, #1F2937 0%, #374151 100%);
            font-size: 28px;
        }
        
        /* 无边记图标 */
        .freeform-icon {
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 日历图标 */
        .calendar-icon {
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6px;
        }
        
        .calendar-day {
            font-size: 9px;
            color: #DC2626;
            font-weight: 600;
        }
        
        .calendar-date {
            font-size: 24px;
            color: #1F2937;
            font-weight: 600;
            line-height: 1;
        }
        
        /* UDID图标 */
        .udid-icon {
            background: linear-gradient(135deg, #14B8A6 0%, #0D9488 100%);
            font-size: 28px;
            color: white;
        }
        
        /* App Store图标 */
        .appstore-icon {
            background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
            font-size: 32px;
            color: white;
        }
        
        /* 搜索栏 */
        .search-bar {
            margin: 0 16px 24px;
            background: rgba(30, 50, 70, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: rgba(255,255,255,0.8);
            font-size: 16px;
            touch-action: manipulation;
        }
        
        /* 底部Dock */
        .dock {
            position: relative;
            background: rgba(30, 50, 70, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px 30px 0 0;
            padding: 16px 24px 32px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: auto;
        }
        
        /* 触摸反馈 */
        .app-item:active .app-icon,
        .dock-item:active {
            transform: scale(0.92);
            transition: transform 0.1s ease;
        }
        
        .app-icon, .dock-item {
            transition: transform 0.2s ease;
        }
        
        .dock-item {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .dock-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #DC2626;
            color: white;
            font-size: 13px;
            font-weight: 600;
            min-width: 22px;
            height: 22px;
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
        }
        
        .phone-icon {
            background: #22C55E;
            font-size: 32px;
            color: white;
        }
        
        .camera-icon {
            background: linear-gradient(135deg, #6B7280 0%, #4B5563 100%);
            font-size: 28px;
            color: white;
        }
        
        .message-icon {
            background: #22C55E;
            font-size: 32px;
            color: white;
        }
        
        /* 内容区域底部留白 */
        .content-spacer {
            height: 120px;
        }
        
        /* 响应式字体 */
        @media (max-width: 375px) {
            .temperature-main {
                font-size: 56px;
            }
            .app-icon {
                width: 56px;
                height: 56px;
            }
            .app-name {
                font-size: 10px;
            }
        }
        
        @media (min-width: 414px) {
            .app-icon {
                width: 64px;
                height: 64px;
            }
        }
    </style>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
<div class="phone-frame">
    <div class="main-content">
    <!-- 状态栏 -->
    <div class="status-bar">

    <!-- 天气小组件 -->

        <div class="temp-range">

        <div class="hourly-forecast">
            <div class="hour-item">
                <div class="hour-time">18时</div>
                <div class="hour-icon">
                    <span class="iconify" data-icon="material-symbols:cloud"></span>
                </div>
                <div class="hour-temp">18°</div>
            </div>
            <div class="hour-item">
                <div class="hour-time">18:12</div>
                <div class="hour-icon">
                    <span class="iconify" data-icon="material-symbols:partly-cloudy-day"></span>
                </div>
                <div class="hour-temp">17°</div>
            </div>
            <div class="hour-item">
                <div class="hour-time">19时</div>
                <div class="hour-icon">
                    <span class="iconify" data-icon="material-symbols:cloudy-snowing"></span>
                </div>
                <div class="hour-temp">17°</div>
            </div>
            <div class="hour-item">
                <div class="hour-time">20时</div>
                <div class="hour-icon">
                    <span class="iconify" data-icon="material-symbols:cloud"></span>
                </div>
                <div class="hour-temp">16°</div>
            </div>
            <div class="hour-item">
                <div class="hour-time">21时</div>
                <div class="hour-icon">
                    <span class="iconify" data-icon="material-symbols:cloud"></span>
                </div>
                <div class="hour-temp">15°</div>
            </div>
            <div class="hour-item">
                <div class="hour-time">22时</div>
                <div class="hour-icon">
                    <span class="iconify" data-icon="material-symbols:cloud"></span>
                </div>
                <div class="hour-temp">15°</div>
            </div>
        </div>
    </div>
    
    <div class="weather-label">天气</div>
    
    <!-- 应用网格 -->
    <div class="apps-grid">
        <!-- 电池小组件 -->
        <div class="battery-widget">
            <div class="battery-item">
                <div class="battery-ring">
                    <span class="iconify battery-icon-inner" data-icon="material-symbols:smartphone"></span>
                </div>
            </div>
            <div class="battery-item">
                <div class="battery-ring">
                    <span class="iconify battery-icon-inner" data-icon="material-symbols:watch"></span>
                </div>
            </div>
            <div class="battery-item">
                <div class="battery-ring">
                    <span class="iconify battery-icon-inner" data-icon="material-symbols:headphones"></span>
                </div>
            </div>
            <div class="battery-item">
                <div class="battery-ring">
                    <span class="iconify battery-icon-inner" data-icon="material-symbols:earbuds"></span>
                </div>
            </div>
        </div>
        
        <!-- 宏图UAT -->
        <div class="app-item" onclick="window.location.href='消息列表界面.html'">
            <div class="app-icon hongtu-icon">
                <img src="Image/宏图logo.png" alt="宏图">
            </div>
            <span class="app-name">宏图</span>
        </div>
        
        <!-- 密码 -->
        <div class="app-item">
            <div class="app-icon password-icon">
                <svg width="32" height="40" viewBox="0 0 32 40">
                    <circle cx="10" cy="12" r="6" fill="#F59E0B"/>
                    <circle cx="22" cy="12" r="6" fill="#3B82F6"/>
                    <rect x="8" y="20" width="4" height="16" rx="2" fill="#F59E0B"/>
                    <rect x="20" y="20" width="4" height="16" rx="2" fill="#3B82F6"/>
                </svg>
            </div>
            <span class="app-name">密码</span>
        </div>
        
        <!-- 手记 -->
        <div class="app-item">
            <div class="app-icon notes-icon">
                <span class="iconify" data-icon="material-symbols:menu-book" style="color: #F472B6;"></span>
            </div>
            <span class="app-name">手记</span>
        </div>
        
        <!-- 无边记 -->
        <div class="app-item">
            <div class="app-icon freeform-icon">
                <svg width="40" height="40" viewBox="0 0 40 40">
                    <circle cx="20" cy="20" r="18" fill="#0EA5E9"/>
                    <path d="M12 20 Q20 10 28 20 Q20 30 12 20" fill="none" stroke="white" stroke-width="2"/>
                    <circle cx="20" cy="20" r="4" fill="#F97316"/>
                </svg>
            </div>
            <span class="app-name">无边记</span>
        </div>
        
        <!-- 日历 -->
        <div class="app-item">
            <div class="app-icon calendar-icon">
                <span class="calendar-day">周一</span>
                <span class="calendar-date">30</span>
            </div>
            <span class="app-name">日历</span>
        </div>
        
        <!-- 我的UDID -->
        <div class="app-item">
            <div class="app-icon udid-icon">
                <span class="iconify" data-icon="material-symbols:phone-android"></span>
            </div>
            <span class="app-name">我的UDID</span>
        </div>
        
        <!-- AppleKu Store -->
        <div class="app-item">
            <div class="app-icon appstore-icon">
                <span class="iconify" data-icon="material-symbols:apps"></span>
            </div>
            <span class="app-name">AppleKu Store</span>
        </div>
    </div>
    
    <!-- 搜索栏 -->
    <div class="search-bar">
        <span class="iconify" data-icon="material-symbols:search" style="font-size: 18px;"></span>
        <span>搜索</span>
    </div>
    
    </div>
    
    <!-- 底部Dock -->
    <div class="dock">
        <div class="dock-item phone-icon" onclick="handleAppClick('电话')">
            <span class="iconify" data-icon="material-symbols:call"></span>
            <span class="dock-badge">62</span>
        </div>
        <div class="dock-item camera-icon" onclick="handleAppClick('相机')">
            <span class="iconify" data-icon="material-symbols:photo-camera"></span>
        </div>
        <div class="dock-item message-icon" onclick="handleAppClick('信息')">
            <span class="iconify" data-icon="material-symbols:chat-bubble"></span>
        </div>
    </div>
    
    <script>
        // 移动端交互优化
        document.addEventListener('DOMContentLoaded', function() {
            // 阻止双击缩放
            let lastTouchEnd = 0;
            document.addEventListener('touchend', function(e) {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) {
                    e.preventDefault();
                }
                lastTouchEnd = now;
            }, false);
            
            // 应用图标点击事件
            const appItems = document.querySelectorAll('.app-item');
            appItems.forEach(item => {
                item.addEventListener('click', function() {
                    const appName = this.querySelector('.app-name').textContent;
                    handleAppClick(appName);
                });
            });
            
            // 搜索栏点击事件
            const searchBar = document.querySelector('.search-bar');
            searchBar.addEventListener('click', function() {
                showToast('搜索功能');
            });
            
            // 天气组件点击事件
            const weatherWidget = document.querySelector('.weather-widget');
            weatherWidget.addEventListener('click', function() {
                showToast('天气详情');
            });
        });
        
        // 处理应用点击
        function handleAppClick(appName) {
            showToast('打开 ' + appName);
            
            // 添加触觉反馈（如果支持）
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
        }
        
        // 显示提示
        function showToast(message) {
            // 移除已存在的toast
            const existingToast = document.querySelector('.toast-message');
            if (existingToast) {
                existingToast.remove();
            }
            
            // 创建新toast
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0, 0, 0, 0.8);
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                font-size: 14px;
                z-index: 9999;
                pointer-events: none;
                animation: fadeInOut 1.5s ease;
            `;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 1500);
        }
        
        // 添加动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInOut {
                0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
                20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
                80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
                100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            }
        `;
        document.head.appendChild(style);
        
        // 处理屏幕方向变化
        window.addEventListener('orientationchange', function() {
            setTimeout(function() {
                window.scrollTo(0, 0);
            }, 100);
        });
    </script>
</div>
</body>
</html>
