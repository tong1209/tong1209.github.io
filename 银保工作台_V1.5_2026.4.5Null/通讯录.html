
<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>通讯录</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    /* 自定义绿色 */
    .text-custom-green {
      color: #00A758;
    }
    
    .bg-custom-green {
      background-color: #00A758;
    }
    
    .border-custom-green {
      border-color: #00A758;
    }
    
    /* 全局字体 */
    body {
      font-family: 'NotoSansCJKsc-Medium', sans-serif;
    }
  </style>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
<!-- APP Container: 375x812 -->
<div class="w-[375px] h-[770px] bg-white border border-gray-200 rounded-[40px] shadow-2xl relative overflow-hidden flex flex-col">
<!-- Status Bar -->
<div class="h-10 flex justify-between items-center px-6 pt-2">
<span class="text-xs font-semibold">2:17</span>
<div class="flex items-center space-x-1">
<span class="iconify text-[14px]" data-icon="mdi:signal-cellular-3"></span>
<span class="iconify text-[14px]" data-icon="mdi:wifi"></span>
<span class="iconify text-[14px]" data-icon="mdi:battery-70"></span>
<!-- 底部安全条 -->
<div class="h-6 bg-white flex justify-center items-center shrink-0 absolute bottom-0 left-0 right-0 z-20">
<div class="w-32 h-1 bg-gray-200 rounded-full"></div>
</div>
</div>
</div>
<!-- Title Bar -->
<div class="h-[56px] flex items-center justify-between px-5">
<h1 class="text-xl font-bold text-gray-900">通讯录</h1>
<span class="iconify text-2xl text-gray-700 cursor-pointer" data-icon="mdi:plus-circle-outline"></span>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto hide-scrollbar pb-[86px]">
<!-- Search Bar -->
<div class="px-5 py-2">
<div class="bg-gray-100 rounded-lg flex items-center px-3 py-2 space-x-2">
<span class="iconify text-gray-400" data-icon="mdi:magnify"></span>
<span class="text-sm text-gray-400">搜索</span>
</div>
</div>
<!-- Grid Functions -->
<div class="grid grid-cols-3 gap-2 px-5 py-6">
<div class="flex flex-col items-center space-y-2 cursor-pointer transition-transform active:scale-95">
<div class="bg-white p-3 rounded-xl border border-gray-50 shadow-sm">
<span class="iconify text-2xl text-emerald-600" data-icon="mdi:office-building-outline"></span>
</div>
<span class="text-xs font-medium text-gray-700">通讯录</span>
</div>
<div class="flex flex-col items-center space-y-2 cursor-pointer transition-transform active:scale-95">
<div class="bg-white p-3 rounded-xl border border-gray-50 shadow-sm">
<span class="iconify text-2xl text-emerald-600" data-icon="mdi:comment-plus-outline"></span>
</div>
<span class="text-xs font-medium text-gray-700">我创建的群</span>
</div>
<div class="flex flex-col items-center space-y-2 cursor-pointer transition-transform active:scale-95">
<div class="bg-white p-3 rounded-xl border border-gray-50 shadow-sm">
<span class="iconify text-2xl text-emerald-600" data-icon="mdi:account-group-outline"></span>
</div>
<span class="text-xs font-medium text-gray-700">我加入的群</span>
</div>
</div>
<!-- Divider -->
<div class="h-2 bg-gray-50"></div>
<!-- Contacts List -->
<div class="py-2">
<!-- Group 1 -->
<div class="px-5 py-4 hover:bg-gray-50 cursor-pointer transition-colors border-b border-gray-50">
<div class="flex items-center space-x-3">
<div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center">
<span class="iconify text-white text-xl" data-icon="mdi:office-building"></span>
</div>
<div class="flex-1">
<h3 class="text-sm font-semibold text-gray-800">中宏保险</h3>
</div>
<span class="iconify text-gray-300" data-icon="mdi:chevron-right"></span>
</div>
<!-- Sub item representation -->
<div class="ml-10 mt-3 pl-3 border-l-2 border-gray-100 py-1">
<div class="flex items-center justify-between">
<span class="text-sm text-gray-500">银保及合作渠道部</span>
<span class="iconify text-gray-300" data-icon="mdi:chevron-right"></span>
</div>
</div>
</div>
</div>
<!-- Placeholder for more contacts -->
<div class="flex flex-col items-center justify-center pt-20 opacity-30 grayscale">
<img alt="Blank state background" class="w-32 mb-4" id="1" src="https://modao.cc/agent-py/media/generated_images/2026-01-06/26206131f8794e06bf6295b686f46b82.jpg"/>
<span class="text-xs">正在同步组织架构...</span>
</div>
</div>
<!-- 底部导航栏 (80px) -->
<div class="h-[80px] bg-white border-t border-gray-100 flex items-center justify-around px-2 pb-2 absolute bottom-0 left-0 right-0 z-10">
<div class="flex flex-col items-center space-y-1 group cursor-pointer relative" onclick="window.location.href='消息列表界面.html'">
<div class="relative">
<span class="iconify text-2xl text-gray-400" data-icon="mdi:chat-processing-outline"></span>
<span class="absolute -top-1 -right-2 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center border border-white">39</span>
</div>
<span class="text-[10px] text-gray-400">消息</span>
</div>
<div class="flex flex-col items-center space-y-1 group cursor-pointer" onclick="window.location.href='通讯录.html'">
<span class="iconify text-2xl text-orange-500" data-icon="mdi:account-box-outline"></span>
<span class="text-[10px] text-orange-500 font-bold">通讯录</span>
</div>
<div class="flex flex-col items-center space-y-1 group cursor-pointer" onclick="window.location.href='首页.html'">
<span class="iconify text-2xl text-gray-400" data-icon="mdi:view-grid"></span>
<span class="text-[10px] text-gray-400">工作台</span>
</div>
<div class="flex flex-col items-center space-y-1 group cursor-pointer" onclick="window.location.href='我的.html'">
<span class="iconify text-2xl text-gray-400" data-icon="mdi:account-outline"></span>
<span class="text-[10px] text-gray-400">我的</span>
</div>
</div>
</div>
</body>
</html>
