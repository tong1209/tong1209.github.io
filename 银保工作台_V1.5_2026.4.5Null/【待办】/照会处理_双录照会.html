<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>双录照会</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 自定义绿色 */
    .text-custom-green {
      color: #00A758;
    }
    
    .bg-custom-green {
      background-color: #00A758;
    }
    
    /* 全局字体 */
    body {
      font-family: 'NotoSansCJKsc-Medium', sans-serif;
    }

    .expand-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }

    .expand-content.expanded {
      max-height: 500px;
    }

    .rotate-icon {
      transition: transform 0.3s ease;
    }

    .rotate-icon.rotated {
      transform: rotate(180deg);
    }
  </style>
  <script>
    function toggleExpand(id) {
      const content = document.getElementById(id);
      const icon = document.getElementById(id + '-icon');
      const text = document.getElementById(id + '-text');
      
      if (content.classList.contains('expanded')) {
        content.classList.remove('expanded');
        icon.classList.remove('rotated');
        text.textContent = '展开';
      } else {
        content.classList.add('expanded');
        icon.classList.add('rotated');
        text.textContent = '收起';
      }
    }
  </script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
<!-- APP容器 (375x812) -->
<div class="w-[375px] h-[812px] bg-white border border-gray-200 rounded-[40px] shadow-2xl relative overflow-hidden flex flex-col">
<!-- 系统状态栏模拟 -->
<div class="h-[44px] flex justify-between items-center px-6 shrink-0 bg-white">
<span class="text-sm font-semibold">10:05</span>
<div class="flex items-center space-x-1.5 opacity-70">
<span class="iconify w-4 h-4 text-custom-green" data-icon="material-symbols:signal-cellular-4-bar"></span>
<span class="iconify w-4 h-4" data-icon="material-symbols:wifi"></span>
<div class="flex items-center border border-black rounded-[2px] px-[1px] h-3 w-6 relative">
<div class="bg-black h-full w-[31%]"></div>
</div>
</div>
</div>
<!-- 标题栏 -->
<div class="h-[56px] bg-white flex items-center px-4 shrink-0 border-b border-gray-50 relative">
<span class="iconify w-6 h-6 text-gray-700 absolute left-4" data-icon="material-symbols:arrow-back-ios-new-rounded" onclick="window.history.back();"></span>
<h1 class="text-lg font-medium text-gray-800 text-center w-full">双录照会</h1>
</div>
<!-- 搜索功能 -->
<div class="p-3 bg-white shrink-0">
<div class="flex space-x-2">
<div class="flex-1 bg-gray-100 rounded-full h-9 flex items-center px-4">
<span class="iconify w-5 h-5 text-gray-400 mr-2" data-icon="material-symbols:search"></span>
<input class="bg-transparent text-sm outline-none w-full text-gray-600 placeholder-gray-400" placeholder="您可输入保单号、银行/经代名称" type="text"/>
</div>
<button class="text-custom-green font-medium text-sm px-2">搜索</button>
</div>
</div>
<!-- 内容滚动区 (676px) -->
<div class="flex-1 overflow-y-auto hide-scrollbar p-3 space-y-3">
<!-- 业务明细卡片 -->
<div class="bg-white rounded-lg shadow-sm p-4 text-sm relative">
<!-- 保单号和状态 -->
<div class="flex justify-between items-center mb-4">
<div class="flex items-center">
<span class="iconify w-5 h-5 text-gray-800 mr-1" data-icon="material-symbols:person-outline"></span>
<span class="font-bold text-gray-900">王佳</span>
</div>
<span class="text-red-500 font-medium hidden">待回复</span>
</div>
<!-- 核心列表数据 -->
<div class="space-y-2.5">
<p class="flex justify-between"><span class="text-gray-400">创建日期</span><span class="text-gray-700">2026-01-01</span></p>
<p class="flex justify-between"><span class="text-gray-400">保单号码</span><span class="text-gray-700">97365419A</span></p>
<p class="flex justify-between"><span class="text-gray-400">银行/经代名称</span><span class="text-gray-700">建设银行</span></p>
<p class="flex justify-between"><span class="text-gray-400">当前状态</span><span class="text-gray-700">照会</span></p>
<p class="flex justify-between items-center">
  <span class="text-gray-400">照会内容</span>
  <a href="照会内容详情.html" class="text-custom-green text-sm flex items-center cursor-pointer">
    <span>查看照会</span>
    <span class="iconify w-4 h-4 ml-1 text-gray-400" data-icon="lucide:chevron-right"></span>
  </a>
</p>
<p class="flex justify-between"><span class="text-gray-400">照会次数</span><span class="text-gray-700">2</span></p>
</div>


</div>
</div>
</div>
</body>
</html>
