    /* 添加激活状态样式 */
    .nav-active {
      color: #111827;

    }

    /* 筛选弹窗样式 */
    .filter-modal {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 20;
      justify-content: center;
      align-items: center;
    }
    
    .filter-modal.active {
      display: flex;
    }
    
    .filter-modal-content {
      background: white;
      width: 90%;
      max-height: 70%;
      border-radius: 16px;
      padding: 16px;
      position: relative;
      overflow-y: auto;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      scrollbar-width: none; /* Firefox */
      -ms-overflow-style: none; /* IE and Edge */
    }

    .filter-modal-content::-webkit-scrollbar {
      display: none; /* Chrome, Safari and Opera */
    }
    
    /* 底部附挂弹窗样式 */
    .bottom-modal {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 20;
      justify-content: flex-end;
      align-items: flex-end;
    }
    
    .bottom-modal.active {

    }
    
    .bottom-modal-content {
      background: white;
      width: 100%;
      border-radius: 16px 16px 0 0;
      padding: 16px;

      box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.1);

<script>
  // 当前激活的标签
  let currentTab = 'all';
  let currentFilter = 'valid'; // 默认显示有效保单
  
  // 搜索框交互
  document.addEventListener('DOMContentLoaded', () => {
    const searchInput = document.getElementById('search-input');
    const clearSearch = document.getElementById('clear-search');
    
    if (searchInput && clearSearch) {
      searchInput.addEventListener('input', () => {
        if (searchInput.value.trim() !== '') {
          clearSearch.classList.remove('hidden');
        } else {
          clearSearch.classList.add('hidden');
        }
      });
      
      clearSearch.addEventListener('click', () => {
        searchInput.value = '';
        clearSearch.classList.add('hidden');
        searchInput.focus();
      });
    }
  });
  
  // 保存筛选弹窗
  function showSaveFilterModal() {
    document.getElementById('saveFilterModal').classList.add('active');
  }
  
  function closeSaveFilterModal() {
    document.getElementById('saveFilterModal').classList.remove('active');
  }
  
  function saveFilter() {
    const filterName = document.getElementById('filterNameInput').value;
    if (filterName.trim() === '') {
      alert('请输入筛选名称');
      return;
    }
    
    // 模拟保存筛选
    alert('筛选已保存：' + filterName);
    
    // 在导航栏添加筛选标签
    const tabNav = document.querySelector('.flex.items-center.space-x-6');
    const newTab = document.createElement('div');
    newTab.className = 'flex flex-col items-center';
    newTab.innerHTML = `
      <span class="nav-inactive whitespace-nowrap">${filterName}</span>
      <div class="w-6 h-1 bg-transparent mt-1 rounded-full"></div>
    `;
    tabNav.appendChild(newTab);
    
    closeSaveFilterModal();
  }
  
  // 切换标签页
  function switchTab(tabName) {
    // 重置所有标签为非活动状态
    document.querySelectorAll('.flex-col.items-center').forEach(el => {
      const spanElement = el.querySelector('span');
      const indicator = el.querySelector('div:last-child');
      if(spanElement && indicator) {
        spanElement.classList.remove('nav-active');
        spanElement.classList.add('nav-inactive');
        spanElement.classList.remove('font-bold');
        indicator.classList.remove('bg-custom-green');
        indicator.classList.add('bg-transparent');
      }
    });
    
    // 设置选中标签为活动状态
    const activeTab = document.getElementById(tabName + '-tab');
    const activeSpan = activeTab.querySelector('span');
    const activeIndicator = activeTab.querySelector('div:last-child');
    
    activeSpan.classList.remove('nav-inactive');
    activeSpan.classList.add('nav-active', 'font-bold');
    activeIndicator.classList.remove('bg-transparent');
    activeIndicator.classList.add('bg-custom-green');
    
    currentTab = tabName;
    
    // 显示对应标签的内容
    showTabContent(tabName);
  }
  
  // 显示对应标签的内容
  function showTabContent(tabName) {
    // 这里可以添加加载对应列表的逻辑
    // 目前只是简单隐藏/显示内容，实际项目中可能需要从服务器获取数据
    console.log('Switched to tab: ' + tabName);
    
    // 根据标签名称显示对应的保单列表
    const policyItems = document.querySelectorAll('.policy-item');
    
    policyItems.forEach(item => {
      switch(tabName) {
        case 'all':
          item.style.display = 'block';
          break;
        case 'renewal':
          // 在实际应用中，这里会根据保单的续期状态来决定显示/隐藏
          // 这里我们模拟显示续期保单
          item.style.display = item.classList.contains('renewal-policy') ? 'block' : 'none';
          break;
        case 'loan':
          // 在实际应用中，这里会根据保单的贷款状态来决定显示/隐藏
          item.style.display = item.classList.contains('loan-policy') ? 'block' : 'none';
          break;
        case 'deduction':
          // 在实际应用中，这里会根据保单的扣款状态来决定显示/隐藏
          item.style.display = item.classList.contains('deduction-policy') ? 'block' : 'none';
          break;
        case 'lapse':
          // 在实际应用中，这里会根据保单的失效状态来决定显示/隐藏
          item.style.display = item.classList.contains('lapse-policy') ? 'block' : 'none';
          break;
        default:
          item.style.display = 'block';
      }
    });
  }

      validBtn.classList.remove('bg-gray-50', 'text-gray-400');

      preBtn.classList.remove('bg-custom-green', 'text-white');
      preBtn.classList.add('bg-gray-50', 'text-gray-400');

      validBtnFilter.classList.remove('bg-gray-50', 'text-gray-400');

      validBtn.classList.remove('bg-custom-green', 'text-white');
      validBtn.classList.add('bg-gray-50', 'text-gray-400');

      preBtnFilter.classList.remove('bg-gray-50', 'text-gray-400');

      validBtnFilter.classList.remove('bg-custom-green', 'text-white');

    }
    
    currentFilter = status;

  }

  // 切换筛选弹窗显示/隐藏
  function toggleFilter() {
    const filterModal = document.getElementById('filterModal');
    filterModal.classList.toggle('active');
    
    // 如果弹窗被激活，阻止内容滚动
    const mainContent = document.querySelector('.flex-1.overflow-y-auto');
    if (filterModal.classList.contains('active')) {
      mainContent.style.overflow = 'hidden';
    } else {
      mainContent.style.overflow = 'auto';
    }
  }
  
  // 重置筛选条件
  function resetFilters() {
    // 重置所有筛选条件为默认值
    document.querySelectorAll('.filter-option button').forEach(button => {
      if(button.textContent !== '全部') {
        button.classList.remove('active');
      } else {
        button.classList.add('active');
      }
    });
    
    // 重置下拉选择框
    document.querySelectorAll('select').forEach(select => {
      // 重置为第一个选项（通常是"全部"）
      select.selectedIndex = 0;
    });
    
    // 隐藏自定义日期面板
    document.getElementById('customDatePanel').classList.add('hidden');
    document.getElementById('customDatePanel2').classList.add('hidden');
  }
  
  // 处理筛选选项点击
  document.querySelectorAll('.filter-option button').forEach(button => {
    button.addEventListener('click', function() {
      const parentDiv = this.parentElement.parentElement;
      let parentGroupTitle = '';
      
      // 尝试获取父组标题
      let container = parentDiv.parentElement;
      // 向上查找直到找到包含label的容器
      while (container && !parentGroupTitle) {
        const label = container.querySelector('label');
        if (label) {
          parentGroupTitle = label.textContent;
        } else {
          container = container.parentElement;
        }
      }
      
      // 对于保单承保日、保单递交日，只允许单选
      if(['保单承保日', '保单递交日'].includes(parentGroupTitle)) {
        // 移除同组内其他按钮的active类
        parentDiv.querySelectorAll('button').forEach(btn => {
          btn.classList.remove('active');
        });
        
        // 为当前按钮添加active类
        this.classList.add('active');
        
        // 如果点击的是"保单承保日-自定义"，则显示日期选择器
        if(parentGroupTitle === '保单承保日' && this.textContent === '自定义') {
          document.getElementById('customDatePanel').classList.remove('hidden');
        } else if(parentGroupTitle === '保单承保日') {
          // 如果点击的是保单承保日的其他选项，隐藏日期选择器
          document.getElementById('customDatePanel').classList.add('hidden');
        }
        
        // 如果点击的是"保单递交日-自定义"，则显示日期选择器
        if(parentGroupTitle === '保单递交日' && this.textContent === '自定义') {
          document.getElementById('customDatePanel2').classList.remove('hidden');
        } else if(parentGroupTitle === '保单递交日') {
          // 如果点击的是保单递交日的其他选项，隐藏日期选择器
          document.getElementById('customDatePanel2').classList.add('hidden');
        }
      } else {
        // 对于其他组（包括保单状态、出单方式），可以多选
        const parentGroup = this.closest('.space-y-2');
        const allButton = parentGroup.querySelector('.filter-option:first-child button');
        
        if (this.textContent === '全部') {
          // 如果点击的是"全部"，取消其他所有选项的选中状态
          parentGroup.querySelectorAll('.filter-option button').forEach(btn => {
            btn.classList.remove('active');
          });
          this.classList.add('active');
        } else {
          // 如果点击的是其他选项，切换其选中状态
          this.classList.toggle('active');
          
          // 检查是否有其他选项被选中
          const hasActiveButtons = Array.from(parentGroup.querySelectorAll('.filter-option button')).some(btn => {
            return btn !== allButton && btn.classList.contains('active');
          });
          
          // 如果有其他选项被选中，取消"全部"的选中状态
          if (hasActiveButtons && allButton) {
            allButton.classList.remove('active');
          } else if (!hasActiveButtons && allButton) {
            // 如果没有其他选项被选中，选中"全部"
            allButton.classList.add('active');
          }
        }
      }
    });
  });
  
  // 确定筛选条件
  function applyFilters() {
    // 这里可以添加应用筛选条件的逻辑
    toggleFilter(); // 关闭弹窗
  }
