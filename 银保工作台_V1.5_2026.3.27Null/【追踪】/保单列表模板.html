<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>保单列表 - 投保追踪</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
    body { 
        background-color: #f8fafc; 
        font-family: -apple-system, BlinkMacSystemFont; 
    }
    .hide-scrollbar::-webkit-scrollbar { 
        display: none; 
    }
    .policy-card {
        transition: all 0.2s ease;
    }
    .policy-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px -5px rgba(0, 0, 0, 0.1);
    }
    .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
    }
</style>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
<!-- APP容器 -->
<div class="w-[375px] h-[812px] bg-white border border-gray-200 rounded-[40px] shadow-2xl relative overflow-hidden flex flex-col">
    <!-- 导航栏 -->
    <header class="pt-12 pb-4 px-4 bg-white flex items-center justify-between border-b border-slate-50 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a class="p-2 hover:bg-slate-50 rounded-full transition-colors" href="投保追踪主页面.html">
                <span class="iconify text-2xl text-slate-800" data-icon="solar:alt-arrow-left-outline"></span>
            </a>
            <div>
                <h1 class="text-lg font-bold text-slate-800">保单明细清单</h1>
                <p class="text-xs text-slate-500" id="statusTitle">核保通过 (624)</p>
            </div>
        </div>
        <button class="p-2">
            <span class="iconify text-2xl text-slate-600" data-icon="solar:magnifer-linear"></span>
        </button>
    </header>
    
    <!-- 筛选和统计 -->
    <div class="bg-blue-50/50 px-4 py-3 flex items-center justify-between border-b border-slate-100">
        <div class="flex items-center gap-2">
            <span class="text-xs text-blue-600 font-medium bg-white px-2 py-1 rounded border border-blue-100 shadow-sm">
                当前状态: <span id="currentStatus">核保通过</span>
            </span>
            <span class="text-[10px] text-slate-400">共 <span id="totalCount">624</span> 条记录</span>
        </div>
        <button class="text-blue-600 text-xs font-medium flex items-center gap-1">
            <span class="iconify text-sm" data-icon="solar:filter-bold-duotone"></span>
            筛选
        </button>
    </div>
    
    <!-- 列表内容 -->
    <main class="h-[630px] overflow-y-auto px-4 py-4 hide-scrollbar space-y-3" id="policyList">
        <!-- 保单卡片将通过JavaScript动态生成 -->
    </main>
    
    <!-- 加载更多 -->
    <div class="px-4 pb-6">
        <button class="w-full py-3 bg-slate-100 text-slate-600 text-sm font-medium rounded-xl hover:bg-slate-200 transition-colors">
            加载更多...
        </button>
    </div>
    
    <!-- 底部 Home Indicator -->
    <div class="absolute bottom-1 w-32 h-1 bg-slate-200 left-1/2 -translate-x-1/2 rounded-full"></div>
</div>

<script>

            {

            {

                amount: '8,500.00',
                status: '核保阻断',
                statusClass: 'rose',
                time: '2026-02-14 11:30:45',
                notice: '健康告知异常，需人工审核'
            },
            {
                id: 'PA20260214001298',
                name: '刘*芳',

                product: '平安福终身寿险',
                bank: '中国银行 - 广州分行',
                amount: '15,000.00',
                status: '核保阻断',
                statusClass: 'rose',

                notice: '职业类别超出承保范围'
            }
        ]
    },
    'offline_notice_processing': {
        title: '线下单 - 照会处理中',
        count: 192,
        policies: [
            {
                id: 'BK20260214002844',

            },
            {

                name: '孙*伟',
                type: '线下单',
                product: '平安智盈人生终身寿险',
                bank: '工商银行 - 杭州西湖支行',
                amount: '25,000.00',

            }
        ]

        count: 190,
        policies: [
            {
                id: 'BK20260214004233',

                notice: '已提交补充资料，等待系统确认'
            }
        ]
    }
};

// 获取URL参数
function getUrlParameter(name) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(name);
}

// 根据状态类型渲染页面
function renderPolicyList() {
    const statusType = getUrlParameter('type') || 'online';
    const statusName = getUrlParameter('status') || 'approved';
    const key = `${statusType}_${statusName}`;
    
    const data = mockData[key] || mockData['online_approved'];
    
    // 更新页面标题和统计信息
    document.getElementById('statusTitle').textContent = `${data.title} (${data.count})`;
    document.getElementById('currentStatus').textContent = data.title.split(' - ')[1];
    document.getElementById('totalCount').textContent = data.count;
    
    // 渲染保单列表
    const policyList = document.getElementById('policyList');
    policyList.innerHTML = '';
    
    data.policies.forEach(policy => {
        const card = createPolicyCard(policy);
        policyList.appendChild(card);
    });
}

// 创建保单卡片
function createPolicyCard(policy) {
    const card = document.createElement('div');
    card.className = 'policy-card bg-white rounded-2xl border border-slate-100 p-4 shadow-sm';
    
    const statusColors = {
        'emerald': 'bg-emerald-100 text-emerald-700',
        'rose': 'bg-rose-100 text-rose-700',
        'orange': 'bg-orange-100 text-orange-700',
        'amber': 'bg-amber-100 text-amber-700',
        'blue': 'bg-blue-100 text-blue-700',
        'indigo': 'bg-indigo-100 text-indigo-700'
    };
    
    const statusColor = statusColors[policy.statusClass] || 'bg-slate-100 text-slate-700';
    
    card.innerHTML = `
        <div class="flex justify-between items-start mb-3">
            <div>
                <div class="flex items-center gap-2 mb-1">
                    <span class="px-1.5 py-0.5 ${statusColor} text-[9px] font-bold rounded">
                        ${policy.type}
                    </span>
                    <span class="text-xs font-bold text-slate-800">${policy.name}</span>
                </div>
                <p class="text-[11px] text-slate-500">投保编码: ${policy.id}</p>
            </div>
            <span class="text-sm font-bold text-blue-600">¥ ${policy.amount}</span>
        </div>
        
        <div class="flex justify-between items-center bg-slate-50 rounded-lg p-2 mb-3">
            <div class="text-[10px] text-slate-500">
                <p>产品：${policy.product}</p>
                <p>银行：${policy.bank}</p>
            </div>
            <div class="text-right">
                <span class="text-[10px] ${statusColor.replace('bg-', 'text-').replace('100', '600')} font-semibold">
                    ${policy.status}
                </span>
            </div>
        </div>
        
        ${policy.notice ? `
        <div class="bg-amber-50 border border-amber-100 rounded-lg p-2 mb-3">
            <p class="text-[10px] text-amber-700">
                <span class="font-medium">照会内容：</span>${policy.notice}
            </p>
        </div>
        ` : ''}
        
        <div class="flex justify-between items-center text-[10px] text-slate-400">
            <span>处理时间: ${policy.time}</span>
            <button class="text-blue-600 font-medium flex items-center gap-1">
                查看详情
                <span class="iconify text-xs" data-icon="solar:alt-arrow-right-linear"></span>
            </button>
        </div>
    `;
    
    return card;
}

// 页面加载完成后渲染列表
document.addEventListener('DOMContentLoaded', renderPolicyList);
</script>
</body>
</html>
