
<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>个人中心</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* 自定义绿色 */
    .text-custom-green {
      color: #00A758;
    }
    .bg-custom-green {
      background-color: #00A758;
    }
    /* 全局字体 */
    body {
      font-family: 'NotoSansCJKsc-Medium', sans-serif;
    }
  </style>
</head>
<body class="bg-gray-50 flex justify-center items-center min-h-screen">
<!-- APP Container: 375x812 -->
<div class="w-[375px] h-[812px] bg-white border border-gray-200 rounded-[40px] shadow-2xl relative overflow-hidden flex flex-col">
<!-- Top Gradient Header Area -->
<div class="h-[260px] bg-gradient-to-br from-[#e8f5ec] via-[#f0f9f1] to-[#f5f3ff] px-6 pt-12 relative">
<!-- Top Action -->
<div class="flex justify-end">
<button class="bg-white/80 backdrop-blur px-3 py-1.5 rounded-full text-xs text-gray-600 font-medium border border-white">修改资料</button>
</div>
<!-- User Profile Card -->
<div class="mt-4 flex items-center space-x-4">
<!-- Avatar -->
<div class="w-20 h-20 rounded-full border-4 border-white shadow-sm overflow-hidden flex items-center justify-center bg-[#3b82f6]">
<span class="text-white text-xl font-bold">张三</span>
</div>
<!-- User Info -->
<div class="flex flex-col">
<h2 class="text-xl font-bold text-gray-800">Zhang San (ZS123456)</h2>
<p class="text-sm text-gray-500 mt-1">中宏保险</p>

</div>
</div>
<!-- Floating Interaction Button -->
<div class="absolute -bottom-6 inset-x-6">
<button class="w-full bg-[#10b981] hover:bg-[#059669] active:scale-[0.98] transition-all py-3 px-4 rounded-xl shadow-md shadow-emerald-100 flex items-center justify-center space-x-2 text-white font-medium text-sm">
<span class="iconify text-lg" data-icon="mdi:plus-circle-outline"></span>
<span>添加我的状态</span>
</button>
</div>
</div>
<!-- Main Content Area -->
<div class="flex-1 mt-12 px-6 overflow-y-auto hide-scrollbar space-y-4 pb-[86px]">
<!-- List Group -->
<div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden group">
<div class="flex items-center justify-between p-4 hover:bg-gray-50 cursor-pointer transition-colors border-b border-gray-50">
<div class="flex items-center space-x-4">
<span class="iconify text-2xl text-[#10b981]" data-icon="mdi:card-account-details-outline"></span>
<span class="text-gray-700 font-medium">我的名片</span>
</div>
<span class="iconify text-gray-300" data-icon="mdi:chevron-right"></span>
</div>
<div class="flex items-center justify-between p-4 hover:bg-gray-50 cursor-pointer transition-colors border-b border-gray-50" onclick="window.location.href='【我的】/我的薪资_方案三.html'">
<div class="flex items-center space-x-4">
<span class="iconify text-2xl text-[#10b981]" data-icon="mdi:cash-multiple"></span>
<span class="text-gray-700 font-medium">我的薪资</span>
</div>
<span class="iconify text-gray-300" data-icon="mdi:chevron-right"></span>
</div>
<div class="flex items-center justify-between p-4 hover:bg-gray-50 cursor-pointer transition-colors border-b border-gray-50" onclick="window.location.href='【我的】/我的收藏.html'">
<div class="flex items-center space-x-4">
<span class="iconify text-2xl text-[#10b981]" data-icon="mdi:heart-outline"></span>
<span class="text-gray-700 font-medium">收藏</span>
</div>
<span class="iconify text-gray-300" data-icon="mdi:chevron-right"></span>
</div>
<div class="flex items-center justify-between p-4 hover:bg-gray-50 cursor-pointer transition-colors">
<div class="flex items-center space-x-4">
<span class="iconify text-2xl text-[#10b981]" data-icon="mdi:cog-outline"></span>
<span class="text-gray-700 font-medium">设置</span>
</div>
<span class="iconify text-gray-300" data-icon="mdi:chevron-right"></span>
</div>
</div>
<!-- Status Bar Decoration -->
<div class="py-10 flex flex-col items-center justify-center opacity-20">
<span class="iconify text-6xl text-gray-300" data-icon="mdi:flower-tulip-outline"></span>
<p class="text-xs mt-2">暂无更多动态内容</p>
</div>
</div>
<!-- 底部导航栏 (80px) -->
<div class="h-[80px] bg-white border-t border-gray-100 flex items-center justify-around px-2 pb-2 absolute bottom-0 left-0 right-0 z-10">
<div class="flex flex-col items-center space-y-1 group cursor-pointer relative" onclick="window.location.href='消息列表界面.html'">
<div class="relative">
<span class="iconify text-2xl text-gray-400" data-icon="mdi:chat-processing-outline"></span>
<span class="absolute -top-1 -right-2 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center border border-white">39</span>
</div>
<span class="text-[10px] text-gray-400">消息</span>
</div>
<div class="flex flex-col items-center space-y-1 group cursor-pointer" onclick="window.location.href='通讯录.html'">
<span class="iconify text-2xl text-gray-400" data-icon="mdi:account-box-outline"></span>
<span class="text-[10px] text-gray-400">通讯录</span>
</div>
<div class="flex flex-col items-center space-y-1 group cursor-pointer" onclick="window.location.href='首页.html'">
<span class="iconify text-2xl text-gray-400" data-icon="mdi:view-grid"></span>
<span class="text-[10px] text-gray-400">工作台</span>
</div>
<div class="flex flex-col items-center space-y-1 group cursor-pointer" onclick="window.location.href='我的.html'">
<span class="iconify text-2xl text-orange-500" data-icon="mdi:account-outline"></span>
<span class="text-[10px] text-orange-500 font-bold">我的</span>
</div>
</div>
</div>
</body>
</html>
