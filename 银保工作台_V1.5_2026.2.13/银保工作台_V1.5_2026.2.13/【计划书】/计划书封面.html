<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>保险产品计划书封页</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
        /* 隐藏滚动条 */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 模拟信封折叠阴影 */
        .envelope-shadow {
            box-shadow: inset -20px -20px 60px rgba(0,0,0,0.05), inset 20px 20px 60px rgba(255,255,255,0.3);
        }

        /* 旋转进入动画 */
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-appear {
            animation: fadeInScale 0.8s ease-out forwards;
        }
        
        /* 自定义绿色 */
        .text-custom-green {
          color: #00A758;
        }
        
        .bg-custom-green {
          background-color: #00A758;
        }
        
        /* 全局字体 */
        body {
          font-family: 'NotoSansCJKsc-Medium', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen p-4">
<!-- APP Container: 375x812 -->
<a href="计划书详情.html" class="block">
<div class="w-[375px] h-[812px] bg-[#ff8a7a] rounded-[40px] shadow-2xl relative overflow-hidden flex flex-col animate-appear border-[8px] border-white/20 cursor-pointer">
<!-- 背景装饰：模拟信封翻盖效果 -->
<div class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-[#ff9a8a] to-[#ff7a6a]"></div>
<div class="absolute top-0 left-0 w-full h-[30%] bg-[#ff9585] origin-top-left -skew-y-6 shadow-lg z-0"></div>
<!-- 内容区域 -->
<div class="relative z-10 flex flex-col h-full p-8">
<!-- 品牌标识 -->
<div class="mt-4">
<div class="flex items-center space-x-2">
<span class="iconify text-white text-3xl" data-icon="logos:manulife-icon"></span>
<div class="flex flex-col">
<span class="text-white font-bold text-lg tracking-wider leading-tight">中宏保险</span>
<span class="text-white/80 text-[10px] uppercase tracking-tighter">MANULIFE-SINOCREDIT</span>
</div>
</div>
</div>
<!-- 主文字区域 -->
<div class="mt-24 space-y-6">
<div class="space-y-2">
<h1 class="text-white text-xl font-medium">尊敬的<span class="border-b-2 border-white/40 pb-1 mx-1 font-bold">zzz</span>先生：</h1>
<p class="text-white/90 text-sm leading-relaxed tracking-wide">
                        此保险产品计划书由中宏保险为您特别设计！
                    </p>
</div>
</div>
<!-- 底部圆形标签区域 -->
<div class="mt-auto mb-12 flex justify-end">
<div class="relative group">
<!-- 圆形标签背景 -->
<div class="w-24 h-24 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center p-1 cursor-pointer hover:scale-105 transition-transform duration-300 border border-white/20 block">
<div class="w-full h-full rounded-full bg-white flex flex-col items-center justify-center shadow-lg">
<span class="text-[#ff6a5a] font-bold text-base tracking-widest mb-0.5">亲启</span>
<div class="w-8 h-[1px] bg-[#ff6a5a]/20 my-0.5"></div>
<span class="text-[#ff6a5a] font-medium text-[10px] tracking-tight">敬呈</span>
</div>
</div>
<!-- 装饰光效 -->
<div class="absolute -inset-2 bg-white/20 rounded-full blur-xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
</div>
</div>
<!-- 操作提示/调试工具按钮 -->

</div>
<!-- 装饰线条：模拟纸张质感 -->
<div class="absolute bottom-0 left-0 w-full h-[70%] bg-gradient-to-t from-black/5 to-transparent pointer-events-none"></div>
</div>
</a>
</body>
</html>
