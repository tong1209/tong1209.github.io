<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>投保方案定制</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* 自定义绿色 */
        .text-custom-green {
          color: #00A758;
        }
        .bg-custom-green {
          background-color: #00A758;
        }
        /* 全局字体 */
        body {
          font-family: 'NotoSansCJKsc-Medium', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 flex justify-center items-start min-h-screen py-10">
<!-- APP Container -->
<div class="w-[375px] h-[812px] bg-white border border-gray-200 rounded-3xl shadow-2xl relative overflow-hidden flex flex-col">
<!-- Top Visual/Brand Area -->
<div class="relative h-40 bg-[#f7f3ed]">
<img alt="Chess background with golden king" class="w-full h-full object-cover" id="1" src="https://modao.cc/agent-py/media/generated_images/2026-01-06/0c6ed7fbb7e3485ca7eb2827fdcf5444.jpg"/>
<div class="absolute top-4 left-4 flex items-center bg-white/80 backdrop-blur-sm px-2 py-1 rounded">
<span class="iconify text-[#EC6453] text-xl" data-icon="mdi:shield-check"></span>
<span class="ml-1 text-xs font-bold text-gray-800">中宏保险</span>
</div>
<!-- 底部安全条 -->
<div class="h-6 bg-white flex justify-center items-center shrink-0 absolute bottom-0 left-0 right-0 z-20">
<div class="w-32 h-1 bg-gray-200 rounded-full"></div>
</div>
</div>
<!-- Scrollable Content Area -->
<div class="flex-1 overflow-y-auto hide-scrollbar px-5 py-4 space-y-6 pb-[86px]">
<!-- Section Title -->
<div class="flex justify-between items-center">
<h2 class="text-base font-bold text-gray-800">被保险人资料</h2>
<button class="flex items-center text-xs text-[#EC6453] border border-[#EC6453] px-2 py-1 rounded">
<span class="iconify mr-1" data-icon="mdi:refresh"></span>重置
                </button>
</div>
<!-- Form Fields -->
<div class="space-y-4">
<div class="flex justify-between items-center border-b border-gray-100 pb-3">
<label class="text-sm text-gray-500">姓名</label>
<span class="text-sm text-gray-800">测试</span>
</div>
<div class="flex justify-between items-center border-b border-gray-100 pb-3">
<label class="text-sm text-gray-500">性别</label>
<div class="flex space-x-6">
<label class="flex items-center text-sm text-gray-400">
<span class="iconify mr-1" data-icon="mdi:radiobox-blank"></span>男
                        </label>
<label class="flex items-center text-sm text-[#EC6453]">
<span class="iconify mr-1 text-[#EC6453]" data-icon="mdi:radiobox-marked"></span>女
                        </label>
</div>
</div>
<div class="flex justify-between items-center border-b border-gray-100 pb-3">
<label class="text-sm text-gray-500">年龄</label>
<div class="flex items-center space-x-2">
<span class="text-sm text-gray-800">30岁</span>
<div class="flex items-center border border-gray-200 px-2 py-1 rounded text-xs text-gray-500">
                            1995-12-29 <span class="iconify ml-1" data-icon="mdi:calendar-month"></span>
</div>
</div>
</div>
<div class="flex justify-between items-center border-b border-gray-100 pb-3">
<label class="text-sm text-gray-500">职业</label>
<div class="flex items-center text-sm text-gray-800">
                        行政内勤人员 <span class="iconify ml-1 text-gray-400" data-icon="mdi:chevron-right"></span>
</div>
</div>
</div>
<!-- Relationship -->
<div class="space-y-4 pt-2">
<h3 class="text-sm font-bold text-gray-800">投保人与被保险人关系</h3>
<div class="flex justify-between items-center border-b border-gray-100 pb-3">
<label class="text-sm text-gray-500">投保人是被保险人的</label>
<div class="flex items-center text-sm text-gray-800">
                        本人 <span class="iconify ml-1 text-gray-400" data-icon="mdi:chevron-right"></span>
</div>
</div>
</div>
<!-- Product Selection -->
<div class="space-y-4 pt-2">
<h3 class="text-sm font-bold text-gray-800">险种制作</h3>
<div class="bg-gray-50/50 rounded-xl p-4 border border-gray-100 space-y-4">
<div class="flex justify-between items-start">
<h4 class="text-sm font-bold text-[#EC6453] leading-snug max-w-[200px]">中宏交宏福特定疾病保险</h4>
<div class="flex space-x-2">
<button class="flex items-center bg-white border border-gray-200 px-2 py-1 rounded text-[10px] text-gray-500">
<span class="iconify mr-1" data-icon="mdi:trash-can-outline"></span>删除
                            </button>
<button class="flex items-center bg-[#EC6453] text-white px-2 py-1 rounded text-[10px]">
<span class="iconify mr-1" data-icon="mdi:pencil-box-outline"></span>定制
                            </button>
</div>
</div>
<p class="text-[10px] text-gray-400">首期保险费：100,000.00元</p>
<!-- Details Card -->
<div class="bg-white rounded-lg overflow-hidden border border-gray-100">
<div class="grid grid-cols-4 bg-gray-50 text-[9px] text-gray-400 py-2 border-b border-gray-100 text-center">
<div>险种</div>
<div>基本保险金额</div>
<div>交费期间/保险期间</div>
<div>交费周期/首期保险费</div>
</div>
<div class="grid grid-cols-4 text-[9px] text-gray-700 py-3 text-center items-center">
<div class="px-1 border-r border-gray-50">中宏交宏福特定疾病保险</div>
<div class="border-r border-gray-50">321,937.00元</div>
<div class="border-r border-gray-50">一次性交清/终身</div>
<div>-- / 100,000.00元</div>
</div>
</div>
</div>
<button class="w-full py-3 border border-dashed border-[#EC6453] rounded-xl text-xs text-[#EC6453] flex items-center justify-center bg-red-50/20">
<span class="iconify mr-1 text-base" data-icon="mdi:plus-circle-outline"></span> 添加更多主险方案
                </button>
</div>
<!-- Total and Notes -->
<div class="space-y-4 pt-2">
<div class="flex justify-between items-center px-1">
<span class="text-sm font-bold text-gray-800">首期保险费合计</span>
<span class="text-base font-bold text-[#EC6453] underline decoration-red-200 underline-offset-4">100,000.00元</span>
</div>
<div class="space-y-2">
<label class="text-sm text-gray-500">添加备注</label>
<textarea class="w-full h-24 bg-gray-50 border border-gray-100 rounded-xl p-3 text-sm focus:outline-none focus:ring-1 focus:ring-[#EC6453] transition-all placeholder-gray-300" placeholder="添加备注..."></textarea>
</div>
</div>
<div class="h-20"></div>
</div>
<!-- Footer Button -->
<div class="absolute bottom-0 inset-x-0 p-6 bg-white/95 backdrop-blur-md border-t border-gray-100 z-10">
<a href="计划书封面.html">
<button class="w-full bg-[#EC6453] hover:bg-[#d06b5a] active:scale-[0.98] text-white py-4 rounded-xl font-bold text-sm shadow-xl shadow-red-100 transition-all leading-none">
                生成计划书
            </button>
</a>
</div>
<!-- 底部导航栏 (80px) -->
<div class="h-[80px] bg-white border-t border-gray-100 flex items-center justify-around px-2 pb-2 absolute bottom-0 left-0 right-0 z-10">
<div class="flex flex-col items-center space-y-1 group cursor-pointer relative" onclick="window.location.href='../消息列表界面.html'">
<div class="relative">
<span class="iconify text-2xl text-gray-400" data-icon="mdi:chat-processing-outline"></span>
<span class="absolute -top-1 -right-2 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center border border-white">39</span>
</div>
<span class="text-[10px] text-gray-400">消息</span>
</div>
<div class="flex flex-col items-center space-y-1 group cursor-pointer" onclick="window.location.href='../通讯录.html'">
<span class="iconify text-2xl text-gray-400" data-icon="mdi:account-box-outline"></span>
<span class="text-[10px] text-gray-400">通讯录</span>
</div>
<div class="flex flex-col items-center space-y-1 group cursor-pointer" onclick="window.location.href='../首页.html'">
<span class="iconify text-2xl text-orange-500" data-icon="mdi:view-grid"></span>
<span class="text-[10px] text-orange-500 font-bold">工作台</span>
</div>
<div class="flex flex-col items-center space-y-1 group cursor-pointer" onclick="window.location.href='../我的.html'">
<span class="iconify text-2xl text-gray-400" data-icon="mdi:account-outline"></span>
<span class="text-[10px] text-gray-400">我的</span>
</div>
</div>
</div>
</body>
</html>
