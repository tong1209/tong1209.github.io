<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BSM一面</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .required::before { content: '*'; color: red; margin-right: 2px; }
    
    /* 自定义绿色 */
    .text-custom-green {
      color: #00A758;
    }
    
    .bg-custom-green {
      background-color: #00A758;
    }
    
    /* 全局字体 */
    body {
      font-family: 'NotoSansCJKsc-Medium', sans-serif;
    }
  </style>
</head>
<body class="bg-gray-100 flex justify-start items-start min-h-screen">
<!-- Container for both app and documentation -->
<div class="flex flex-row space-x-4 p-4">
<!-- APP Container -->
<div class="w-[375px] h-[812px] bg-white border border-gray-200 rounded-[40px] shadow-2xl relative overflow-hidden flex flex-col">
<!-- Title Bar -->
<div class="h-[56px] flex items-center justify-between px-4 pt-4 bg-white border-b border-gray-50">
<span class="iconify w-6 h-6 text-gray-700 z-10" data-icon="material-symbols:arrow-back-ios-new-rounded" onclick="window.location.href='BSM招募主界面.html';"></span>
<h1 class="text-lg font-bold text-gray-900 flex-1 text-center">基本信息录入</h1>
<div class="w-6"></div>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto hide-scrollbar bg-gray-50 px-4 py-4 space-y-4">
<!-- Form Container -->
<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 space-y-4">
<!-- 姓名 -->
<div class="flex items-center space-x-2">
<label class="text-xs font-medium text-gray-700 required w-24">姓名</label>
<input type="text" class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-xs bg-gray-100 text-gray-500 cursor-not-allowed" value="张三" disabled/>
</div>

<!-- 证件类型 -->
<div class="flex items-center space-x-2">
<label class="text-xs font-medium text-gray-700 required w-24">证件类型</label>
<div class="flex-1">
<select class="w-full px-3 py-2 border border-gray-200 rounded-lg text-xs bg-gray-100 text-gray-500 cursor-not-allowed" disabled>
<option value="">请选择证件类型</option>
<option value="001" selected>身份证</option>
<option value="002">护照</option>
<option value="003">港澳通行证</option>
<option value="004">台湾通行证</option>
</select>
</div>
</div>

<!-- 证件号 -->
<div class="flex items-center space-x-2">
<label class="text-xs font-medium text-gray-700 required w-24">证件号</label>
<input type="text" class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-xs bg-gray-100 text-gray-500 cursor-not-allowed" value="**********1234" disabled/>
</div>

<!-- 出生日期 -->
<div class="flex items-center space-x-2">
<label class="text-xs font-medium text-gray-700 required w-24">出生日期</label>
<input type="date" class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-xs bg-gray-100 text-gray-500 cursor-not-allowed" value="1990-01-01" disabled/>
</div>

<!-- 性别 -->
<div class="flex items-center space-x-2">
<label class="text-xs font-medium text-gray-700 required w-24">性别</label>
<select class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-xs bg-gray-100 text-gray-500 cursor-not-allowed" disabled>
<option value="">请选择性别</option>
<option value="M" selected>男</option>
<option value="F">女</option>
</select>
</div>

<!-- 手机号码 -->
<div class="flex items-center space-x-2">
<label class="text-xs font-medium text-gray-700 required w-24">手机号码</label>
<input type="tel" class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-xs bg-gray-100 text-gray-500 cursor-not-allowed" value="****8000" disabled/>
</div>

<!-- 现居住地 -->
<div class="flex items-center space-x-2">
<label class="text-xs font-medium text-gray-700 required w-24">现居住地</label>
<select class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-xs bg-gray-100 text-gray-500 cursor-not-allowed" disabled>
<option value="">请选择现居住地</option>
<option value="001" selected>北京</option>
<option value="002">上海</option>
<option value="003">广州</option>
<option value="004">深圳</option>
<option value="005">南京</option>
</select>
</div>

<!-- 详细地址 -->
<div class="flex items-center space-x-2">
<label class="text-xs font-medium text-gray-700 required w-24">详细地址</label>
<input type="text" class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-xs bg-gray-100 text-gray-500 cursor-not-allowed" value="北京市朝阳区建国路88号" disabled/>
</div>

<!-- 学历 -->
<div class="flex items-center space-x-2">
<label class="text-xs font-medium text-gray-700 required w-24">学历</label>
<select class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-xs bg-gray-100 text-gray-500 cursor-not-allowed" disabled>
<option value="">请选择学历</option>
<option value="001">小学</option>
<option value="002">初中</option>
<option value="003">高中</option>
<option value="004">大专</option>
<option value="005" selected>本科</option>
<option value="006">硕士</option>
<option value="007">博士</option>
</select>
</div>

<!-- 简历 -->
<div class="flex items-center space-x-2">
<label class="text-xs font-medium text-gray-700 required w-24">简历</label>
<div class="flex-1 flex items-center space-x-2">
<span class="text-xs text-gray-500">简历.pdf</span>
<button class="text-xs text-[#00A758] flex items-center">
<span class="iconify w-3 h-3 mr-1" data-icon="material-symbols:download"></span>
下载
</button>
</div>
</div>




</div>
</div>
</div>

</div>
</body>
</html>
