<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>招募一面聊天界面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* 自定义绿色 */
        .text-custom-green {
            color: #00A758;
        }
        
        .bg-custom-green {
            background-color: #00A758;
        }
        
        /* 全局字体 */
        body {
            font-family: 'NotoSansCJKsc-Medium', sans-serif;
        }
        
        /* 微信聊天样式 */
        .chat-bubble-left {
            background-color: #F0F0F0;
            border-radius: 18px 18px 18px 4px;
            align-self: flex-start;
        }
        
        .chat-bubble-right {
            background-color: #07C160;
            color: white;
            border-radius: 18px 18px 4px 18px;
            align-self: flex-end;
        }
        
        .chat-time {
            font-size: 10px;
            color: #999;
            margin: 8px 0;
            text-align: center;
        }
        
        .message-status {
            font-size: 10px;
            color: #999;
            margin-left: 4px;
        }
    </style>
</head>
<body class="bg-gray-100 flex justify-center items-start min-h-screen p-4">
    <!-- APP容器 (375x812) -->
    <div class="w-[375px] h-[812px] bg-white border border-gray-200 rounded-[40px] shadow-2xl relative overflow-hidden flex flex-col">
        <!-- 顶部状态栏 (44px) -->
        <div class="h-[44px] bg-white flex justify-between items-center px-6 shrink-0">
            <span class="text-sm font-semibold">10:05</span>
            <div class="flex items-center space-x-1.5 opacity-70">
                <span class="iconify w-4 h-4" data-icon="material-symbols:signal-cellular-4-bar"></span>
                <span class="iconify w-4 h-4" data-icon="material-symbols:wifi"></span>
                <div class="flex items-center border border-black rounded-[2px] px-[1px] h-3 w-6">
                    <div class="bg-black h-full w-[32%]"></div>
                </div>
            </div>
        </div>
        
        <!-- 微信聊天顶部栏 -->
        <div class="h-[56px] bg-white flex items-center px-4 shrink-0 border-b border-gray-200">
            <span class="iconify w-6 h-6 text-gray-700" data-icon="material-symbols:arrow-back-ios-new-rounded" onclick="window.history.back();"></span>
            <div class="flex-1 ml-4">
                <h1 class="text-lg font-medium text-gray-900">二面面试官</h1>
                <p class="text-xs text-green-600">在线</p>
            </div>
            <div class="flex items-center space-x-4">
                <span class="iconify w-5 h-5 text-gray-700" data-icon="material-symbols:search"></span>
                <span class="iconify w-5 h-5 text-gray-700" data-icon="material-symbols:more-vert"></span>
            </div>
        </div>
        
        <!-- 聊天内容区 -->
        <div class="flex-1 overflow-y-auto hide-scrollbar bg-gray-50 p-4">
            <!-- 日期分隔 -->
            <div class="chat-time">今天 14:00</div>
            
            <!-- SS消息 -->
            <div class="flex items-start justify-end mb-4">
                <div class="chat-bubble-right px-4 py-2 max-w-[70%]">
                    <p class="text-sm">你好面试官Y！有一位BSM候选人需要安排二面，想邀请你担任面试官。</p>
                </div>
                <div class="w-8 h-8 rounded-full bg-gray-300 flex items-center justify-center ml-2 flex-shrink-0">
                    <span class="text-xs font-medium text-gray-700">SS</span>
                </div>
            </div>
            
            <!-- 面试官消息 -->
            <div class="flex items-start mb-4">
                <div class="w-8 h-8 rounded-full bg-blue-300 flex items-center justify-center mr-2 flex-shrink-0">
                    <span class="text-xs font-medium text-white">Y</span>
                </div>
                <div class="chat-bubble-left px-4 py-2 max-w-[70%]">
                    <p class="text-sm">好的，候选人什么情况？什么时候方便面试？</p>
                </div>
            </div>
            
            <!-- SS消息 -->
            <div class="flex items-start justify-end mb-4">
                <div class="chat-bubble-right px-4 py-2 max-w-[70%]">
                    <p class="text-sm">候选人王五，4年销售经验，本科毕业，对银保业务有深入了解。希望能在下周一上午安排面试，您看方便吗？</p>
                </div>
                <div class="w-8 h-8 rounded-full bg-gray-300 flex items-center justify-center ml-2 flex-shrink-0">
                    <span class="text-xs font-medium text-gray-700">SS</span>
                </div>
            </div>
            
            <!-- 面试官消息 -->
            <div class="flex items-start mb-4">
                <div class="w-8 h-8 rounded-full bg-blue-300 flex items-center justify-center mr-2 flex-shrink-0">
                    <span class="text-xs font-medium text-white">Y</span>
                </div>
                <div class="chat-bubble-left px-4 py-2 max-w-[70%]">
                    <p class="text-sm">下周一上午可以，具体几点？</p>
                </div>
            </div>
            
            <!-- SS消息 -->
            <div class="flex items-start justify-end mb-4">
                <div class="chat-bubble-right px-4 py-2 max-w-[70%]">
                    <p class="text-sm">上午10点可以吗？我会把候选人的简历和面试要求发给您。</p>
                </div>
                <div class="w-8 h-8 rounded-full bg-gray-300 flex items-center justify-center ml-2 flex-shrink-0">
                    <span class="text-xs font-medium text-gray-700">SS</span>
                </div>
            </div>
            
            <!-- 面试官消息 -->
            <div class="flex items-start mb-4">
                <div class="w-8 h-8 rounded-full bg-blue-300 flex items-center justify-center mr-2 flex-shrink-0">
                    <span class="text-xs font-medium text-white">Y</span>
                </div>
                <div class="chat-bubble-left px-4 py-2 max-w-[70%]">
                    <p class="text-sm">可以，10点没问题。</p>
                </div>
            </div>
            
            <!-- 时间分隔 -->
            <div class="chat-time">14:15</div>
            
            <!-- SS消息 - 面试要求链接分享 -->
            <div class="flex items-start justify-end mb-4">
                <div class="chat-bubble-right px-4 py-3 max-w-[70%]">
                    <div class="bg-white rounded-lg border border-gray-200 p-3">
                        <div class="flex items-center mb-2">
                            <span class="iconify w-5 h-5 text-green-600 mr-2" data-icon="logos:wechat"></span>
                            <p class="text-sm font-medium">BSM面试要求</p>
                        </div>
                        <p class="text-xs text-gray-600 mb-2">面试官Y，请查看王五的面试要求和评分标准，下周一上午10点准时开始面试。</p>
                        <div class="bg-gray-100 rounded px-3 py-2 cursor-pointer" onclick="window.location.href='BSM二面.html'">
                            <p class="text-xs text-blue-600 truncate">点击查看面试要求</p>
                        </div>
                    </div>
                    <div class="flex items-center justify-end mt-2">
                        <span class="text-xs text-gray-500">14:15</span>
                        <span class="message-status">已读</span>
                    </div>
                </div>
                <div class="w-8 h-8 rounded-full bg-gray-300 flex items-center justify-center ml-2 flex-shrink-0">
                    <span class="text-xs font-medium text-gray-700">SS</span>
                </div>
            </div>
        </div>
        
        <!-- 聊天输入区 -->
        <div class="bg-white border-t border-gray-200 p-3">
            <div class="flex items-center mb-2">
                <span class="iconify w-5 h-5 text-gray-500 mr-3" data-icon="material-symbols:insert-emoticon"></span>
                <span class="iconify w-5 h-5 text-gray-500 mr-3" data-icon="material-symbols:attach-file"></span>
                <span class="iconify w-5 h-5 text-gray-500 mr-3" data-icon="material-symbols:mic"></span>
                <input type="text" class="flex-1 border border-gray-200 rounded-full px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400" placeholder="输入消息..."/>
                <button class="ml-2 w-8 h-8 rounded-full bg-green-500 flex items-center justify-center">
                    <span class="iconify w-4 h-4 text-white" data-icon="material-symbols:send"></span>
                </button>
            </div>
        </div>
        
        <!-- 底部安全条 -->
        <div class="h-6 bg-white flex justify-center items-center shrink-0">
            <div class="w-32 h-1 bg-gray-200 rounded-full"></div>
        </div>
    </div>
</body>
</html>
