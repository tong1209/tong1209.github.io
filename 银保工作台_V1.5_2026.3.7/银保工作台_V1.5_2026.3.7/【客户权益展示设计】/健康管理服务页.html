
<!DOCTYPE html>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 模拟列表左侧连接线 */
    .service-line::before {
      content: "";
      position: absolute;
      left: 11px;
      top: 24px;
      bottom: -24px;
      width: 1px;
      background-color: #e5e7eb;
    }
    .service-item:last-child .service-line::before {
      display: none;
    }
    
    /* 自定义绿色 */
    .text-custom-green {
      color: #00A758;
    }
    
    .bg-custom-green {
      background-color: #00A758;
    }
    
    /* 全局字体 */
    body {
      font-family: 'NotoSansCJKsc-Medium', sans-serif;
    }
  </style>
</head>
