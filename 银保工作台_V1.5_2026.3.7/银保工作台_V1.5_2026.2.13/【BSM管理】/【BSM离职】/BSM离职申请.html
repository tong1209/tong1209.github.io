<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BSM离职申请</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* 必录标记 */
        .required::before { content: '*'; color: red; margin-right: 2px; }
        
        /* 自定义绿色*/
        .text-custom-green {
            color: #00A758;
        }
        
        .bg-custom-green {
            background-color: #00A758;
        }
        
        /* 全局字体 */
        body {
            font-family: 'NotoSansCJKsc-Medium', sans-serif;
        }
        
        /* 标签样式 */
        .tag {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 500;
        }
    </style>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
    <!-- APP容器 -->
    <div class="w-[375px] h-[812px] bg-gray-50 border border-gray-200 rounded-[40px] shadow-2xl relative overflow-hidden flex flex-col">
        <!-- 顶部状态栏 -->
        <div class="h-[44px] bg-white flex justify-between items-center px-6 shrink-0">
            <span class="text-sm font-semibold">10:05</span>
            <div class="flex items-center space-x-1.5 opacity-70">
                <span class="iconify w-4 h-4" data-icon="material-symbols:signal-cellular-4-bar"></span>
                <span class="iconify w-4 h-4" data-icon="material-symbols:wifi"></span>
                <div class="flex items-center border border-black rounded-[2px] px-[1px] h-3 w-6">
                    <div class="bg-black h-full w-[32%]"></div>
                </div>
            </div>
        </div>
        
        <!-- 标题栏 -->
        <div class="h-[56px] bg-white flex items-center px-4 shrink-0 border-b border-gray-50">
            <span class="iconify w-6 h-6 text-gray-700 cursor-pointer" data-icon="material-symbols:arrow-back-ios-new-rounded" onclick="window.location.href='./离职管理.html';"></span>
            <h1 class="flex-1 text-center text-lg font-medium text-gray-800">离职申请</h1>
            <div class="w-10"></div>
        </div>
        
        <!-- 内容区-->
        <div class="flex-1 overflow-y-auto hide-scrollbar pb-20">
            <div class="p-4 space-y-4">
                <div class="bg-white rounded-lg shadow-sm p-4">
                    <div class="success-message bg-green-100 text-green-800 p-3 rounded-lg mb-4 text-center hidden" id="successMessage">
                        申请提交成功！
                    </div>
                    
                    <form id="resignationForm" class="space-y-4">
                        <!-- 姓名 -->
                        <div class="flex items-center space-x-2">
                            <label for="name" class="text-xs font-medium text-gray-700 required w-24">姓名</label>
                            <input type="text" id="name" name="name" required class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-xs" placeholder="请输入姓名">
                        </div>
                        
                        <!-- Agent Code -->
                        <div class="flex items-center space-x-2">
                            <label for="agentCode" class="text-xs font-medium text-gray-700 required w-24">Agent Code</label>
                            <input type="text" id="agentCode" name="agentCode" required class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-xs" placeholder="请输入Agent Code">
                        </div>
                        
                        <!-- 岗位级别 -->
                        <div class="flex items-center space-x-2">
                            <label for="positionLevel" class="text-xs font-medium text-gray-700 required w-24">岗位级别</label>
                            <input type="text" id="positionLevel" name="positionLevel" required class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-xs" placeholder="请输入岗位级别">
                        </div>
                        
                        <!-- 证件号 -->
                        <div class="flex items-center space-x-2">
                            <label for="idNumber" class="text-xs font-medium text-gray-700 required w-24">证件号</label>
                            <input type="text" id="idNumber" name="idNumber" required class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-xs" placeholder="请输入证件号">
                        </div>
                        
                        <!-- 申请离职日期 -->
                        <div class="flex items-center space-x-2">
                            <label for="department" class="text-xs font-medium text-gray-700 required w-24">申请离职日期</label>
                            <input type="date" id="department" name="department" required class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-xs">
                        </div>
                        
                        <!-- 预计离职日期 -->
                        <div class="flex items-center space-x-2">
                            <label for="position" class="text-xs font-medium text-gray-700 required w-24">预计离职日期</label>
                            <input type="date" id="position" name="position" required class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-xs">
                        </div>
                        
                        <!-- 离职原因 -->
                        <div>
                            <label for="resignationReason" class="text-xs font-medium text-gray-700 required block mb-1">离职原因</label>
                            <textarea id="resignationReason" name="resignationReason" required rows="3" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-xs" placeholder="请输入离职原因"></textarea>
                        </div>
                        
                        <!-- 附件 -->
                        <div class="flex items-center space-x-2">
                            <label class="text-xs font-medium text-gray-700 w-24">附件</label>
                            <input type="file" id="attachment" name="attachment" class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-xs">
                        </div>
                        <div class="pl-[88px]">
                            <p class="text-xs text-gray-500">支持上传PDF、Word等格式文件</p>
                        </div>
                        
                    </form>
                </div>
            </div>
        </div>
        
        <!-- 提交按钮 -->
        <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl shadow-sm border-t border-gray-100 p-4">
            <div class="flex">
                <button type="submit" form="resignationForm" class="flex-1 bg-[#00A758] text-white text-xs font-medium py-2 px-4 rounded-lg shadow-md flex items-center justify-center">
                    <span class="iconify w-4 h-4 mr-2" data-icon="material-symbols:send"></span>
                    提交申请
                </button>
            </div>
        </div>
    </div>
    
    <script>
        // 表单提交处理
        document.getElementById('resignationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 获取表单数据
            const formData = {
                employeeId: document.getElementById('agentCode').value, // 使用Agent Code作为employeeId
                name: document.getElementById('name').value,
                agentCode: document.getElementById('agentCode').value,
                positionLevel: document.getElementById('positionLevel').value,
                idNumber: document.getElementById('idNumber').value,
                department: document.getElementById('department').value,
                position: document.getElementById('position').value,
                resignationReason: document.getElementById('resignationReason').value,
                attachment: document.getElementById('attachment').files[0] ? document.getElementById('attachment').files[0].name : '',
                submitDate: new Date().toISOString().split('T')[0],
                status: '待审批'
            };
            
            // 保存到本地存储
            let records = JSON.parse(localStorage.getItem('resignationRecords') || '[]');
            records.push(formData);
            localStorage.setItem('resignationRecords', JSON.stringify(records));
            
            // 显示成功消息
            document.getElementById('successMessage').classList.remove('hidden');
            
            // 刷新记录列表
            renderRecords();
            
            // 重置表单
            this.reset();
            
            // 3秒后隐藏成功消息
            setTimeout(function() {
                document.getElementById('successMessage').classList.add('hidden');
            }, 3000);
        });
        
        // 下载已批准的离职申请表
        function downloadApprovedForm(agentCode) {
            alert('已批准的离职申请表下载功能已触发，实际项目中会根据Agent Code：' + agentCode + '生成并下载PDF文件');
        }
        
        // 渲染申请记录
        function renderRecords() {
            const recordList = document.getElementById('recordList');
            const records = JSON.parse(localStorage.getItem('resignationRecords') || '[]');
            
            if (records.length === 0) {
                recordList.innerHTML = '<div class="text-center text-gray-500 py-4">暂无申请记录</div>';
                return;
            }
            
            let html = '';
            records.forEach((record, index) => {
                let statusClass = '';
                let statusText = '';
                
                switch (record.status) {
                    case '待审批':
                        statusClass = 'bg-yellow-100 text-yellow-800';
                        break;
                    case '已批准':
                        statusClass = 'bg-green-100 text-green-800';
                        break;
                    case '已拒绝':
                        statusClass = 'bg-red-100 text-red-800';
                        break;
                }
                
                html += `
                    <div class="bg-white rounded-xl shadow-md p-4 border-l-4 border-custom-green hover:shadow-lg transition-shadow">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-bold text-gray-800">${record.name || record.employeeId}</h3>
                                <p class="text-xs text-gray-500">Agent Code：${record.employeeId}</p>
                                <p class="text-xs text-gray-500 mt-1">提交日期：${record.submitDate}</p>
                            </div>
                            <span class="text-xs px-3 py-1.5 ${statusClass} rounded-full font-medium">${record.status}</span>
                        </div>
                        <div class="space-y-2 text-xs mb-4">
                            <p><span class="text-gray-500">申请离职日期：</span> <span class="text-gray-700 font-medium">${record.department}</span></p>
                            <p><span class="text-gray-500">预计离职日期：</span> <span class="text-gray-700 font-medium">${record.position}</span></p>
                            ${record.attachment ? `<p><span class="text-gray-500">附件：</span> <span class="text-gray-700 font-medium">${record.attachment}</span></p>` : ''}
                        </div>
                        ${record.status === '已批准' ? `
                            <button class="w-full bg-blue-500 text-white py-2 rounded-lg font-medium text-sm hover:bg-blue-600 transition flex items-center justify-center" onclick="downloadApprovedForm('${record.employeeId}')">
                                <span class="iconify w-4 h-4 mr-2" data-icon="material-symbols:download"></span>
                                下载离职申请表
                            </button>
                        ` : ''}
                    </div>
                `;
            });
            
            recordList.innerHTML = html;
        }
        
        // 页面加载时渲染记录
        window.onload = function() {
            renderRecords();
        };
    </script>
</body>
</html>
